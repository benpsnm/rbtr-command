<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RBTR · Command</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
.tab-bar{display:flex;gap:4px;margin-bottom:var(--space-4);flex-wrap:wrap}
.tab-btn{padding:var(--space-1) var(--space-3);background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:var(--text-sm);cursor:pointer;border-radius:var(--radius-sm);font-family:var(--font-mono)}
.tab-btn.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary)}
.slim-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.slim-table th{text-align:left;padding:var(--space-2);border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.05em;font-weight:400}
.slim-table td{padding:var(--space-2);border-bottom:1px solid var(--border-subtle)}
.slim-table tr:last-child td{border:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3)}
.form-row{display:flex;gap:var(--space-2);margin-bottom:var(--space-2);flex-wrap:wrap;align-items:flex-end}
.form-row input,.form-row select,.form-row textarea{flex:1;min-width:120px;padding:var(--space-2);background:var(--bg-secondary);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:var(--text-sm);border-radius:var(--radius-sm);font-family:var(--font-mono)}
.form-row textarea{min-height:80px}
.section-note{font-size:var(--text-xs);color:var(--text-secondary);margin-bottom:var(--space-3);padding:var(--space-2) var(--space-3);background:var(--bg-secondary);border-left:2px solid var(--border-subtle)}
.stage-card{padding:var(--space-4);border:1px solid var(--border-subtle);border-radius:var(--radius-md);margin-bottom:var(--space-3)}
.stage-card.active{border-color:var(--text-primary)}
.stage-card.locked{opacity:.5}
.stage-card.complete{border-color:#4a7c59;background:rgba(74,124,89,.05)}
.pill{display:inline-block;padding:2px 8px;border-radius:var(--radius-pill);font-size:var(--text-xs);font-family:var(--font-mono)}
.pill-hot{background:rgba(220,38,38,.15);color:#f87171}
.pill-warm{background:rgba(217,119,6,.15);color:#fbbf24}
.pill-cold{background:rgba(99,102,241,.15);color:#a5b4fc}
.pill-ok{background:rgba(74,124,89,.15);color:#6ee7b7}
.checklist-item{display:flex;gap:var(--space-2);align-items:flex-start;padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle)}
.checklist-item:last-child{border:none}
.checklist-item input[type=checkbox]{margin-top:2px;accent-color:var(--text-primary);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.checklist-item label{font-size:var(--text-sm);cursor:pointer;line-height:1.4}
.checklist-item label.done{text-decoration:line-through;color:var(--text-secondary)}
.country-row{display:grid;grid-template-columns:1fr 80px 80px 80px;gap:var(--space-2);padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle);font-size:var(--text-sm)}
.build-phase{padding:var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);margin-bottom:var(--space-2)}
.build-phase h4{margin:0 0 var(--space-2);font-size:var(--text-sm);font-weight:600}
.progress-bar{height:4px;background:var(--bg-secondary);border-radius:2px;overflow:hidden;margin:var(--space-2) 0}
.progress-fill{height:100%;background:var(--text-primary);border-radius:2px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}.country-row{grid-template-columns:1fr 60px 60px}}
</style>
</head>
<body>
<div id="portal-root"></div>

<script src="/js/components.js"></script>
<script src="/js/state.js"></script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-framework.js"></script>

<script>
const C = window.RBTR_Components;
const { el, card, statCard, button, emptyState } = C;

// ── Shared helpers ──────────────────────────────────────────────────────────
function proxy(table, op, extra = {}) {
  return fetch('/api/supabase-proxy', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ table, op, ...extra })
  }).then(r => r.ok ? r.json() : []);
}

function tabs(defs, host) {
  const bar = el('div', { className: 'tab-bar' });
  const bodies = [];
  defs.forEach((d, i) => {
    const btn = el('button', { className: 'tab-btn' + (i === 0 ? ' active' : ''), type: 'button' }, d.label);
    const body = el('div', { style: { display: i === 0 ? '' : 'none' } });
    bodies.push(body);
    let loaded = i === 0;
    bar.appendChild(btn);
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bodies.forEach((b, j) => { b.style.display = j === i ? '' : 'none'; });
      if (!loaded) { loaded = true; d.render(body); }
    });
    if (i === 0) d.render(body);
  });
  host.appendChild(bar);
  bodies.forEach(b => host.appendChild(b));
}

function logTable(rows, cols) {
  if (!rows || !rows.length) return emptyState({ icon: '📋', title: 'Nothing logged yet', body: 'Add an entry below.' });
  const t = el('table', { className: 'slim-table' });
  const head = el('tr');
  cols.forEach(c => head.appendChild(el('th', {}, c.label)));
  t.appendChild(el('thead', {}, head));
  const body = el('tbody');
  rows.forEach(row => {
    const tr = el('tr');
    cols.forEach(c => {
      const val = c.render ? c.render(row) : (row[c.key] ?? '—');
      const td = el('td');
      if (val instanceof HTMLElement) td.appendChild(val);
      else td.textContent = String(val);
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
  t.appendChild(body);
  return t;
}

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

// ── MISSION CONTROL ─────────────────────────────────────────────────────────
async function renderCountdown() {
  const wrap = el('div', {});
  const departure = '2027-07-01';
  const days = daysUntil(departure);

  const stats = el('div', { className: 'grid-3', style: { marginBottom: 'var(--space-4)' } });
  stats.appendChild(statCard({ emoji: '🚛', label: 'Days to departure', value: days, sub: '1 July 2027' }));
  stats.appendChild(statCard({ emoji: '🗺', label: 'Countries', value: '45', sub: '5 years on road' }));
  stats.appendChild(statCard({ emoji: '📍', label: 'Destination', value: 'QLD', sub: 'Burleigh Heads, Australia' }));
  wrap.appendChild(stats);

  const milestonesData = [
    { label: 'Guy Martin — Stage 2 eligible', date: '2026-08-01', tag: 'audience' },
    { label: 'Truck acquisition complete', date: '2026-10-01', tag: 'build' },
    { label: 'AirBnB launched — House revenue live', date: '2026-07-01', tag: 'money' },
    { label: 'Eternal retainer starts', date: '2026-05-01', tag: 'money' },
    { label: '50,000 combined audience', date: '2026-09-01', tag: 'audience' },
    { label: '100,000 combined audience', date: '2027-01-01', tag: 'audience' },
    { label: 'Build complete, systems tested', date: '2027-04-01', tag: 'build' },
    { label: 'Sponsors locked in (target 5)', date: '2027-05-01', tag: 'sponsors' },
    { label: 'DEPARTURE — Rotherham → Turkey', date: '2027-07-01', tag: 'expedition' },
  ];

  const milestoneCard = card({ children: el('div', {}) });
  const mc = milestoneCard.querySelector('div');
  mc.appendChild(el('div', { className: 'ds-caption', style: { marginBottom: 'var(--space-3)' } }, 'MILESTONES'));
  milestonesData.forEach(m => {
    const d = daysUntil(m.date);
    const past = d < 0;
    const row = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', padding:'var(--space-2) 0', borderBottom:'1px solid var(--border-subtle)', opacity: past ? '.5' : '1' } });
    const left = el('div');
    left.appendChild(el('span', { className: 'pill ' + (past ? 'pill-ok' : 'pill-warm'), style: { marginRight: 'var(--space-2)' } }, m.tag.toUpperCase()));
    left.appendChild(el('span', { style: { fontSize: 'var(--text-sm)' } }, (past ? '✓ ' : '') + m.label));
    row.appendChild(left);
    row.appendChild(el('span', { style: { fontSize: 'var(--text-xs)', color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)', whiteSpace: 'nowrap' } },
      past ? new Date(m.date).toLocaleDateString('en-GB', { month:'short', year:'numeric' }) : d + 'd'));
    mc.appendChild(row);
  });
  wrap.appendChild(milestoneCard);
  return wrap;
}

async function renderGates() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, 'The Three Gates must all be open before departure funds are secure. Each gate is a single yes/no event.'));

  const gates = [
    { id: 1, name: 'Van sale', desc: 'Sell current van, clear finance, bank residual into truck fund', target_date: '2026-10-01' },
    { id: 2, name: 'Coffee Brothers bike', desc: 'Resolve Coffee Brothers financial dispute. Bike sale clears or settles. Frees headspace.', target_date: '2026-08-01' },
    { id: 3, name: 'T6.1 sale', desc: 'VW T6.1 sold or part-exchanged. Releases £25,000+ into expedition fund.', target_date: '2026-12-01' },
  ];

  let gateStates = {};
  try {
    const rows = await proxy('rbtr_gates', 'select');
    if (Array.isArray(rows)) rows.forEach(r => { gateStates[r.gate_id] = r; });
  } catch(e) {}

  gates.forEach(g => {
    const state = gateStates[g.id] || {};
    const open = state.open === true;
    const c = el('div', { className: 'stage-card' + (open ? ' complete' : '') });
    const header = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'var(--space-2)' } });
    header.appendChild(el('div', {},
      el('span', { style: { fontFamily:'var(--font-mono)', fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginRight:'var(--space-2)' } }, 'GATE ' + g.id),
      el('strong', {}, g.name)
    ));
    header.appendChild(el('span', { className: 'pill ' + (open ? 'pill-ok' : 'pill-cold') }, open ? 'OPEN' : 'LOCKED'));
    c.appendChild(header);
    c.appendChild(el('p', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', margin:'0 0 var(--space-2)' } }, g.desc));
    c.appendChild(el('div', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)' } }, 'Target: ' + new Date(g.target_date).toLocaleDateString('en-GB', { month:'long', year:'numeric' })));
    if (state.notes) c.appendChild(el('p', { style: { fontSize:'var(--text-sm)', marginTop:'var(--space-2)', padding:'var(--space-2)', background:'var(--bg-secondary)', borderRadius:'var(--radius-sm)' } }, state.notes));
    wrap.appendChild(c);
  });
  return wrap;
}

async function renderPredeparture() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, '97-item pre-departure checklist. State persists to Supabase. Tick as you go.'));

  const categories = {
    'Truck & Build': [
      'Truck acquired and registered','Engine service complete','Gearbox service','Diff oils changed','Suspension check',
      'Tyres — 6 new fitted','Spare tyres (2) fitted to rack','Brake system checked and certified','Electrical system rewired',
      'Roof rack fitted and load-tested','Rooftop tent fitted and tested','Drawer system installed','Fridge installed (12V)',
      'Water system (80L tank, pump, grey tank)','Shore power inlet fitted','Solar (400W) wired','Batteries (leisure bank)',
      'Inverter fitted','Air compressor fitted','Winch fitted and tested','Snorkel fitted','Underbody armour complete',
      'Recovery kit (boards, straps, hi-lift)','Tool kit compiled','Spares kit compiled (belts, filters, fuses)',
    ],
    'Documents & Legal': [
      'Ben passport — valid past Aug 2029','Sarah passport — valid past Aug 2029','Hudson passport','Benson passport',
      'Pet passport (Peanut)','Peanut microchip registered','International driving permit (Ben)','International driving permit (Sarah)',
      'Carnet de Passages issued','Vehicle registration document (V5)','Insurance — vehicle (worldwide)','Insurance — health (all 4)',
      'Insurance — repatriation','Insurance — content/media gear','Vaccination certificates (all humans)',
      'Rabies vaccine (Peanut)','Tapeworm treatment certificate (Peanut)',
    ],
    'Finance': [
      'Expedition fund target: £50,000 reached','Monthly runway confirmed: £3,500/mo','Three Gates all open',
      'PSNM revenue: 912 pallets secured or sold to new owner','House AirBnB revenue live','Eternal retainer active',
      'UK tax obligations settled through departure date','Mortgage overpayment / rent arrangement agreed (House)',
      'Emergency fund: £10,000 accessible',
    ],
    'Audience & Sponsors': [
      '100,000 combined audience reached','YouTube monetised (1,000 subs + 4,000hrs)','Instagram 10,000+ followers',
      'Minimum 3 sponsors signed pre-departure','Guy Martin pathway: Stage 4 decision received','First sponsor payment received',
      'Branded content format documented','Content release schedule agreed',
    ],
    'Logistics': [
      'Routing — Turkey visa acquired','Routing — Georgia / Armenia planned','Routing — Iran route confirmed or alternative set',
      'Routing — Central Asia borders checked','Shipping Leg 1: agent in Delhi confirmed','Shipping Leg 2: agent in Mombasa confirmed',
      'Shipping Leg 3: agent in Cape Town confirmed','Shipping Leg 4: agent in Singapore confirmed',
      'SD card supply (12 months)','Camera batteries (spares)','Laptop and charging sorted','Sat comms (Starlink/Garmin inReach)',
      'Medical kit compiled and certified','First aid training (Ben + Sarah)',
    ],
    'Family': [
      'Hudson school — plan agreed with school and ex','Benson nursery — plan agreed','Family communication cadence agreed',
      'Emergency contact list distributed','Power of attorney in place (UK business decisions)',
      'Kids passport emergency contacts added','Wills updated',
    ],
  };

  let savedStates = {};
  try {
    const rows = await proxy('rbtr_predeparture_checklist', 'select');
    if (Array.isArray(rows)) rows.forEach(r => { savedStates[r.item_key] = r.checked; });
  } catch(e) {}

  const saveState = async (key, checked) => {
    try {
      await proxy('rbtr_predeparture_checklist', 'upsert', {
        record: { item_key: key, checked, updated_at: new Date().toISOString() },
        on_conflict: 'item_key'
      });
    } catch(e) {}
  };

  Object.entries(categories).forEach(([cat, items]) => {
    const catCard = card({ children: el('div', {}) });
    const body = catCard.querySelector('div');
    body.appendChild(el('div', { className: 'ds-caption', style: { marginBottom: 'var(--space-3)' } }, cat.toUpperCase()));
    items.forEach((item, i) => {
      const key = cat.replace(/\s+/g, '_').toLowerCase() + '_' + i;
      const checked = savedStates[key] === true;
      const row = el('div', { className: 'checklist-item' });
      const cb = el('input', { type: 'checkbox' });
      cb.checked = checked;
      const lbl = el('label', {}, item);
      if (checked) lbl.className = 'done';
      cb.addEventListener('change', () => {
        lbl.className = cb.checked ? 'done' : '';
        saveState(key, cb.checked);
      });
      row.appendChild(cb);
      row.appendChild(lbl);
      body.appendChild(row);
    });
    wrap.appendChild(catCard);
  });
  return wrap;
}

// ── ROUTE ───────────────────────────────────────────────────────────────────
async function renderRoute() {
  const wrap = el('div', {});
  tabs([
    { label: 'Overview', render: async (host) => {
      let phases = [];
      try { phases = await proxy('rbtr_route_phases', 'select'); } catch(e) {}
      if (!Array.isArray(phases) || !phases.length) {
        phases = [
          { phase: 1, name: 'UK → Turkey', distance_km: 3200, duration_weeks: 6, notes: 'Via France, Switzerland, Italy, Greece or Balkans route' },
          { phase: 2, name: 'Turkey → Central Asia', distance_km: 4800, duration_weeks: 8, notes: 'Via Georgia, Armenia or Iran (TBC), Azerbaijan, Kazakhstan' },
          { phase: 3, name: 'Central Asia → India (Ship)', distance_km: 0, duration_weeks: 3, notes: 'Truck ships: Central Asia port → Delhi. Fly ahead.' },
          { phase: 4, name: 'India → East Africa', distance_km: 0, duration_weeks: 2, notes: 'Truck ships: Chennai → Mombasa. Drive India while truck ships.' },
          { phase: 5, name: 'East Africa → South Africa', distance_km: 6000, duration_weeks: 16, notes: 'Overland Africa: Kenya → Tanzania → Zambia → Malawi → Mozambique → South Africa' },
          { phase: 6, name: 'South Africa → SE Asia (Ship)', distance_km: 0, duration_weeks: 4, notes: 'Cape Town → Singapore (ship). Fly to SE Asia.' },
          { phase: 7, name: 'SE Asia → Australia', distance_km: 3000, duration_weeks: 12, notes: 'Fly truck Darwin or ship. Drive to Burleigh Heads, QLD.' },
        ];
      }
      const totalKm = phases.filter(p => p.distance_km > 0).reduce((a,b) => a + (b.distance_km||0), 0);
      const s = el('div', { className: 'grid-2', style: { marginBottom: 'var(--space-4)' } });
      s.appendChild(statCard({ emoji: '📏', label: 'Drive distance', value: totalKm.toLocaleString() + 'km', sub: 'overland only' }));
      s.appendChild(statCard({ emoji: '🚢', label: 'Shipping legs', value: '3', sub: 'Asia / Africa / Australia' }));
      host.appendChild(s);
      phases.forEach(p => {
        const c = el('div', { className: 'build-phase' });
        c.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' } },
          el('h4', {}, 'Phase ' + p.phase + ': ' + p.name),
          el('span', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', fontFamily:'var(--font-mono)' } },
            p.distance_km ? p.distance_km.toLocaleString() + ' km' : 'SHIP')
        ));
        if (p.duration_weeks) c.appendChild(el('div', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-1)' } }, p.duration_weeks + ' weeks'));
        if (p.notes) c.appendChild(el('p', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', margin:'var(--space-2) 0 0' } }, p.notes));
        host.appendChild(c);
      });
    }},
    { label: 'Shipping', render: (host) => {
      const legs = [
        { leg: 1, route: 'Central Asia → Delhi (India)', via: 'TBC — agent in Delhi', notes: 'Truck shipped while we fly ahead. Estimated 3 weeks transit.' },
        { leg: 2, route: 'Chennai → Mombasa (Kenya)', via: 'RoRo shipping, agent in Mombasa TBC', notes: '12-14 days transit. Drive India coast while truck ships.' },
        { leg: 3, route: 'Cape Town → Singapore', via: 'RoRo or container, Singapore agent TBC', notes: 'Final shipping leg. 3-4 weeks. Fly to SE Asia, collect in Singapore.' },
      ];
      legs.forEach(l => {
        const c = el('div', { className: 'stage-card', style: { marginBottom:'var(--space-3)' } });
        c.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', marginBottom:'var(--space-2)' } },
          el('strong', {}, 'Leg ' + l.leg + ': ' + l.route),
          el('span', { className: 'pill pill-cold' }, 'PENDING')
        ));
        c.appendChild(el('p', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', margin:'0 0 var(--space-1)' } }, 'Via: ' + l.via));
        c.appendChild(el('p', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', margin:'0' } }, l.notes));
        host.appendChild(c);
      });
    }},
    { label: 'Live Map', render: (host) => {
      host.appendChild(el('p', { className: 'section-note' }, 'Live map goes here once expedition starts. Current position updated via Garmin inReach.'));
      const c = card({ children: el('div', {},
        el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-2)' } }, 'CURRENT POSITION'),
        el('p', { style: { color:'var(--text-secondary)', fontSize:'var(--text-sm)' } }, 'Pre-departure — Rotherham, South Yorkshire, UK'),
        el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-2)' } }, 'Departure: 1 July 2027'),
      )});
      host.appendChild(c);
    }},
  ], wrap);
  return wrap;
}

  row2.appendChild(tasksIn);
  const row3 = el('div', { className: 'form-row' });
  row3.appendChild(partsIn); row3.appendChild(issuesIn);
  form.appendChild(row1); form.appendChild(row2); form.appendChild(row3);
  const saveBtn = button({ label: 'Save', onClick: async () => {
    if (!hoursIn.value) return;
    const record = {
      log_date: dateIn.value,
      hours_worked: parseFloat(hoursIn.value),
      tasks_done: tasksIn.value,
      parts_fitted: partsIn.value,
      cost_spent: costIn.value ? parseFloat(costIn.value) : null,
      issues_hit: issuesIn.value,
    };
    try {
      await proxy('rbtr_build_log', 'insert', { record });
      logs.unshift({ ...record, id: 'tmp-' + Date.now() });
      renderLogs();
      [hoursIn, tasksIn, partsIn, costIn, issuesIn].forEach(i => { i.value = ''; });

async function renderGear() {

  const gear = [
    { category: 'Primary camera', item: 'Sony A7IV (or similar)', status: 'TBC', weight: '650g body', notes: 'FF, dual card, excellent autofocus' },
    { category: 'Secondary / action', item: 'GoPro Hero 12', status: 'owned', weight: '150g', notes: 'Mounted on truck exterior, helmet' },
    { category: 'Audio', item: 'Røde Wireless GO II', status: 'TBC', weight: '30g', notes: 'Lapel for walking segments' },
    { category: 'Stabilisation', item: 'DJI RS3 Mini', status: 'TBC', weight: '790g with camera', notes: 'Gimbal for B-roll and walking shots' },
    { category: 'Drone', item: 'DJI Mini 4 Pro', status: 'TBC', weight: '249g', notes: 'Under 250g — most countries no drone license' },
    { category: 'Storage', item: 'CFexpress B + SD (x8)', status: 'TBC', weight: 'Negligible', notes: '512GB each. 12-month supply.' },
    { category: 'Power', item: 'Anker charging hub + truck 12V', status: 'TBC', weight: '—', notes: 'Shore power + solar both charge' },
    { category: 'Laptop', item: 'MacBook Pro M3 14"', status: 'owned', weight: '1.55kg', notes: 'Edit in-field. 18hr battery.' },
    { category: 'Backup', item: 'Crucial X9 Pro 4TB (x2)', status: 'TBC', weight: '40g each', notes: 'Offload every SD card daily. Redundant backups.' },
  ];

  const byCategory = {};
  gear.forEach(g => {
    if (!byCategory[g.category]) byCategory[g.category] = [];
    byCategory[g.category].push(g);
  });

  Object.entries(byCategory).forEach(([cat, items]) => {
    items.forEach(g => {
      const c = card({ children: el('div', {}) });
      const body = c.querySelector('div');
      body.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', marginBottom:'var(--space-1)' } },
        el('div', {},
          el('span', { style: { fontFamily:'var(--font-mono)', fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginRight:'var(--space-2)' } }, cat.toUpperCase()),
          el('strong', {}, g.item)
        ),
        el('span', { className: 'pill ' + (g.status === 'owned' ? 'pill-ok' : 'pill-cold') }, g.status.toUpperCase())
      ));
      body.appendChild(el('div', { style: { display:'flex', gap:'var(--space-4)', fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-1)' } },
        el('span', {}, g.weight),
        el('span', {}, g.notes)
      ));
      wrap.appendChild(c);
    });
  });
  return wrap;
}
