<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BEN · RBTR</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
.tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border-subtle); margin-bottom:var(--space-4); flex-wrap:wrap; }
.tab-btn { padding:var(--space-3) var(--space-4); cursor:pointer; font-size:var(--text-sm); color:var(--text-secondary); border-bottom:2px solid transparent; transition:all var(--transition-fast); background:none; border-top:none; border-left:none; border-right:none; font-family:inherit; }
.tab-btn.active { color:var(--text-primary); border-bottom-color:var(--border-strong); }
.grid-2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--space-3); }
.grid-3 { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:var(--space-3); }
.grid-4 { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:var(--space-3); }
.form-group { margin-bottom:var(--space-4); }
.form-row { display:flex; gap:var(--space-3); flex-wrap:wrap; align-items:flex-end; }
.slim-table { width:100%; border-collapse:collapse; font-size:var(--text-sm); }
.slim-table th { text-align:left; padding:var(--space-2) var(--space-3); color:var(--text-tertiary); font-size:var(--text-xs); letter-spacing:var(--track-wide); text-transform:uppercase; border-bottom:1px solid var(--border-subtle); font-weight:600; }
.slim-table td { padding:var(--space-3); border-bottom:1px solid var(--border-subtle); }
.habit-row { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) 0; border-bottom:1px solid var(--border-subtle); }
.habit-cb { width:18px; height:18px; cursor:pointer; accent-color:var(--text-primary); }
.checklist-item { display:flex; align-items:flex-start; gap:var(--space-3); padding:var(--space-3); border-bottom:1px solid var(--border-subtle); }
.checklist-item input[type=checkbox] { margin-top:2px; width:16px; height:16px; cursor:pointer; accent-color:var(--text-primary); flex-shrink:0; }
.checklist-item.done label { text-decoration:line-through; color:var(--text-tertiary); }
.timeline-item { display:flex; gap:var(--space-4); padding:var(--space-3) 0; border-bottom:1px solid var(--border-subtle); }
.tl-dot { width:10px; height:10px; border-radius:50%; background:var(--border-default); flex-shrink:0; margin-top:5px; }
.tl-dot.done { background:var(--text-primary); }
.tl-dot.upcoming { background:var(--text-secondary); }
.gate-card { background:var(--bg-secondary); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:var(--space-5); }
.pbar { background:var(--bg-tertiary); border-radius:var(--radius-pill); height:6px; margin:var(--space-2) 0; }
.pbar-fill { background:var(--text-primary); height:100%; border-radius:var(--radius-pill); transition:width 0.4s; }
.mood-btn { padding:var(--space-2) var(--space-3); background:var(--bg-tertiary); border:1px solid var(--border-default); border-radius:var(--radius-md); cursor:pointer; font-size:var(--text-sm); transition:all var(--transition-fast); font-family:inherit; }
.mood-btn.sel { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }
.section-note { background:var(--bg-secondary); border-left:3px solid var(--border-default); padding:var(--space-4); border-radius:0 var(--radius-md) var(--radius-md) 0; margin-bottom:var(--space-5); font-size:var(--text-sm); color:var(--text-secondary); line-height:var(--leading-loose); }
.task-pill { display:inline-flex; align-items:center; padding:2px var(--space-2); border-radius:var(--radius-pill); font-size:var(--text-xs); letter-spacing:var(--track-wide); text-transform:uppercase; border:1px solid var(--border-subtle); color:var(--text-tertiary); margin-right:var(--space-1); }
@media(max-width:600px){ .grid-4{grid-template-columns:1fr 1fr;} .form-row{flex-direction:column;} }
</style>
</head>
<body>
<div id="portal-root"></div>
<script src="/js/components.js"></script>
<script src="/js/state.js"></script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-framework.js"></script>
<script>
'use strict';
const C = window.RBTR_Components;
const { el, card, statCard, button, emptyState } = C;

// ── Shared helpers ──────────────────────────────────────────────────────────
function proxy(table, op, extra = {}) {
  return fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ table, op, ...extra }) }).then(r => r.ok ? r.json() : []);
}
function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-GB') : '—'; }
function fmtGbp(n) { return n != null ? '£' + Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'; }

function tabs(defs) {
  const wrap = el('div', {});
  const bar = el('div', { className: 'tab-bar' });
  const bodies = [];
  defs.forEach((d, i) => {
    const btn = el('button', { className: 'tab-btn' + (i === 0 ? ' active' : ''), onClick: () => activate(i) }, d.label);
    bar.appendChild(btn);
    const body = el('div', { style: { display: i === 0 ? '' : 'none' } });
    bodies.push(body);
    wrap.appendChild(body);
    if (i === 0) d.render(body);
  });
  wrap.insertBefore(bar, wrap.firstChild);
  function activate(idx) {
    bar.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    bodies.forEach((b, i) => { b.style.display = i === idx ? '' : 'none'; });
    if (!bodies[idx].dataset.loaded) { bodies[idx].dataset.loaded = '1'; defs[idx].render(bodies[idx]); }
  }
  return wrap;
}

function logTable(rows, cols) {
  if (!rows.length) return emptyState({ icon: '·', title: 'Nothing logged yet' });
  const tbl = el('table', { className: 'slim-table' });
  tbl.appendChild(el('thead', {}, el('tr', {}, ...cols.map(c => el('th', {}, c.label)))));
  const tb = el('tbody', {});
  rows.forEach(r => tb.appendChild(el('tr', {}, ...cols.map(c => el('td', {}, c.render ? c.render(r) : (r[c.key] ?? '—'))))));
  tbl.appendChild(tb);
  return tbl;
}

// ── sec-today ───────────────────────────────────────────────────────────────
async function renderToday() {
  const wrap = el('div', {});

  // Departure + photoshoot counters
  const dep = Math.ceil((new Date('2027-07-01') - new Date()) / 86400000);
  const stats = el('div', { className: 'grid-4', style: { marginBottom: 'var(--space-5)' } });
  const daysLeftStat = statCard({ emoji: '🚛', label: 'Days to departure', value: dep, sub: '1 July 2027' });
  stats.appendChild(daysLeftStat);
  const builtDadStat = statCard({ emoji: '💪', label: 'Built Dad', value: '—', sub: 'day of 56' });
  stats.appendChild(builtDadStat);
  const weatherStat = statCard({ emoji: '☁', label: 'Rotherham', value: '—', sub: 'loading…' });
  stats.appendChild(weatherStat);
  const moodStat = statCard({ emoji: '🧠', label: 'Last mood', value: '—', sub: 'from log' });
  stats.appendChild(moodStat);
  wrap.appendChild(stats);

  // Load live data
  try {
    const [bd, moods] = await Promise.all([
      fetch('/api/briefing-data').then(r => r.json()).then(j => j.data || {}),
      proxy('ben_mood_log', 'select'),
    ]);
    const val = builtDadStat.querySelector('.value');
    if (val && bd.built_dad_day != null) val.textContent = bd.built_dad_day;
    if (Array.isArray(moods) && moods.length) {
      moods.sort((a,b) => b.date.localeCompare(a.date));
      const mv = moodStat.querySelector('.value');
      if (mv) mv.textContent = moods[0].mood + '/10';
    }
  } catch(e) {}

  // Weather
  try {
    const wr = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.42&longitude=-1.36&current=temperature_2m,weather_code');
    const wj = await wr.json();
    const wv = weatherStat.querySelector('.value');
    if (wv && wj.current) wv.textContent = Math.round(wj.current.temperature_2m) + '°C';
    const ws = weatherStat.querySelector('.sub');
    if (ws) ws.textContent = 'Rotherham now';
  } catch(e) {}

  // Top 3 Focus
  wrap.appendChild(el('h2', { className: 'ds-h2' }, "Today's Top 3"));
  const top3Card = card({ children: el('div', { id: 'top3-host' }, 'Loading…') });
  wrap.appendChild(top3Card);

  try {
    const goals = await proxy('ben_goals', 'select');
    const todayOpen = (goals || []).filter(g => g.tier === 'today' && g.status === 'open').slice(0, 3);
    const host = top3Card.querySelector('#top3-host');
    host.innerHTML = '';
    if (todayOpen.length === 0) {
      host.appendChild(emptyState({ icon: '🎯', title: 'No today goals set', body: 'Add them in Goals → Today tab.' }));
    } else {
      todayOpen.forEach((g, i) => {
        host.appendChild(el('div', { style: { padding: 'var(--space-2) 0', borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', gap: 'var(--space-3)' } },
          el('span', { style: { fontFamily: 'var(--font-mono)', color: 'var(--text-tertiary)', minWidth: '20px' } }, (i+1) + '.'),
          el('span', {}, g.content)
        ));
      });
    }
  } catch(e) {}

  // Daily Habits
  wrap.appendChild(el('h2', { className: 'ds-h2', style: { marginTop: 'var(--space-6)' } }, 'Daily Habits'));
  const habitsCard = card({});
  const habits = ['5am wake — no phone first','Water + 5 mins outside','Training done','Portal briefing read','Top 3 set','Family time protected','Evening log done'];
  const today = new Date().toISOString().slice(0, 10);
  const habitsKey = 'rbtr_habits_' + today;
  let savedHabits = {};
  try { savedHabits = JSON.parse(localStorage.getItem(habitsKey) || '{}'); } catch(e) {}
  habits.forEach((h, i) => {
    const row = el('div', { className: 'habit-row' });
    const cb = el('input', { type: 'checkbox', className: 'habit-cb' });
    cb.checked = !!savedHabits[i];
    cb.addEventListener('change', () => { savedHabits[i] = cb.checked; try { localStorage.setItem(habitsKey, JSON.stringify(savedHabits)); } catch(e){} });
    row.appendChild(cb);
    row.appendChild(el('label', { style: { flex: '1', fontSize: 'var(--text-sm)', cursor: 'pointer' }, onClick: () => { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } }, h));
    habitsCard.appendChild(row);
  });
  wrap.appendChild(habitsCard);

  // Mood + Energy log
  wrap.appendChild(el('h2', { className: 'ds-h2', style: { marginTop: 'var(--space-6)' } }, 'Log Today'));
  wrap.appendChild(renderMoodLogForm());

  return wrap;
}

function renderMoodLogForm() {
  const wrap = el('div', {});
  const state = { mood: null, energy: null };
  const makeButtons = (key, max) => {
    const row = el('div', { style: { display: 'flex', gap: 'var(--space-2)', flexWrap: 'wrap' } });
    for (let i = 1; i <= max; i++) {
      const n = i;
      const btn = el('button', { className: 'mood-btn', onClick: () => {
        state[key] = n;
        row.querySelectorAll('.mood-btn').forEach((b, j) => b.classList.toggle('sel', j + 1 === n));
      } }, String(n));
      row.appendChild(btn);
    }
    return row;
  };
  const sleepInp = el('input', { type: 'number', className: 'ds-input', step: '0.5', min: '0', max: '12', placeholder: 'e.g. 7.5', style: { maxWidth: '120px' } });
  const notesInp = el('input', { className: 'ds-input', placeholder: 'One line (optional)' });
  const status = el('div', { className: 'ds-caption', style: { marginTop: 'var(--space-2)' } });

  const saveBtn = button({ variant: 'primary', label: 'Log', onClick: async () => {
    if (!state.mood || !state.energy) { status.textContent = 'Pick mood and energy.'; return; }
    saveBtn.disabled = true; saveBtn.textContent = '…';
    const today = new Date().toISOString().slice(0, 10);
    await proxy('ben_mood_log', 'delete', { match: { date: today } });
    const r = await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table:'ben_mood_log', op:'insert', row: { date: today, mood: state.mood, energy: state.energy, sleep_hours: sleepInp.value ? Number(sleepInp.value) : null, notes: notesInp.value || null } }) });
    saveBtn.disabled = false; saveBtn.textContent = 'Log';
    if (r.ok) { C.toast({ type:'success', message: 'Logged.' }); status.textContent = ''; }
    else { status.textContent = 'Save failed.'; }
  } });

  wrap.appendChild(card({ children: el('div', {},
    el('div', { className: 'form-row' },
      el('div', { style: { flex: '1' } }, el('div', { className: 'ds-label' }, 'Mood 1-10'), makeButtons('mood', 10)),
      el('div', { style: { flex: '1' } }, el('div', { className: 'ds-label' }, 'Energy 1-10'), makeButtons('energy', 10)),
    ),
    el('div', { className: 'form-row', style: { marginTop: 'var(--space-4)' } },
      el('div', {}, el('div', { className: 'ds-label' }, 'Sleep hours'), sleepInp),
      el('div', { style: { flex: '1' } }, el('div', { className: 'ds-label' }, 'Note'), notesInp),
    ),
    el('div', { className: 'form-row', style: { marginTop: 'var(--space-4)', justifyContent: 'flex-end' } }, saveBtn),
    status,
  ) }));
  return wrap;
}

// ── sec-goals ───────────────────────────────────────────────────────────────
async function renderGoals() {
  const TIERS = ['today', 'week', 'month', 'life', 'rbtr'];
  const TIER_LABELS = { today: 'Today', week: 'Week', month: 'Month', life: 'Life', rbtr: 'RBTR' };

  function renderTier(tierKey, host) {
    host.innerHTML = '';
    proxy('ben_goals', 'select').then(all => {
      const items = (all || []).filter(g => g.tier === tierKey).sort((a, b) => a.created_at > b.created_at ? -1 : 1);
      const addRow = el('div', { className: 'form-row', style: { marginBottom: 'var(--space-4)' } });
      const inp = el('input', { className: 'ds-input', placeholder: 'New goal…', style: { flex: '1' } });
      const addBtn = button({ variant: 'primary', size: 'sm', label: 'Add', onClick: async () => {
        if (!inp.value.trim()) return;
        addBtn.disabled = true;
        await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ table:'ben_goals', op:'insert', row: { tier: tierKey, content: inp.value.trim(), status: 'open' } }) });
        inp.value = ''; addBtn.disabled = false;
        renderTier(tierKey, host);
      } });
      addRow.appendChild(inp); addRow.appendChild(addBtn);
      host.appendChild(addRow);

      if (!items.length) { host.appendChild(emptyState({ icon: '🎯', title: 'No goals here yet' })); return; }
      items.forEach(g => {
        const row = el('div', { className: 'checklist-item' + (g.status === 'done' ? ' done' : '') });
        const cb = el('input', { type: 'checkbox' }); cb.checked = g.status === 'done';
        cb.addEventListener('change', async () => {
          await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ table:'ben_goals', op:'update', match:{ id: g.id }, row: { status: cb.checked ? 'done' : 'open', completed_at: cb.checked ? new Date().toISOString() : null } }) });
          renderTier(tierKey, host);
        });
        const lbl = el('label', { style: { flex: '1', cursor: 'pointer' }, onClick: () => { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } }, g.content);
        row.appendChild(cb); row.appendChild(lbl);
        host.appendChild(row);
      });
    });
  }

  return tabs([
    ...TIERS.map(t => ({
      label: TIER_LABELS[t],
      render: (host) => renderTier(t, host)
    })),
    { label: 'Wins Wall', render: (host) => {
      proxy('ben_goals', 'select').then(all => {
        const wins = (all || []).filter(g => g.status === 'done').sort((a,b) => (b.completed_at||'') > (a.completed_at||'') ? 1 : -1);
        host.innerHTML = '';
        if (!wins.length) { host.appendChild(emptyState({ icon: '🏆', title: 'No wins logged yet', body: 'Tick goals off above and they appear here.' })); return; }
        wins.slice(0, 50).forEach(g => {
          host.appendChild(el('div', { style: { padding: 'var(--space-3) 0', borderBottom: '1px solid var(--border-subtle)', display: 'flex', gap: 'var(--space-3)', alignItems: 'center' } },
            el('span', { style: { color: 'var(--text-tertiary)', fontSize: 'var(--text-xs)', minWidth: '80px' } }, fmtDate(g.completed_at)),
            el('span', { className: 'task-pill' }, g.tier),
            el('span', { style: { flex: '1' } }, g.content)
          ));
        });
      });
    } }
  ]);
}

// ── sec-dailybrief ──────────────────────────────────────────────────────────
async function renderDailyBrief() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'text-muted', style: { marginBottom: 'var(--space-5)' } },
    'Yesterday, today, this week — at a glance.'));

  try {
    const [bd, moods, goals] = await Promise.all([
      fetch('/api/briefing-data').then(r => r.json()).then(j => j.data || {}),
      proxy('ben_mood_log', 'select'),
      proxy('ben_goals', 'select'),
    ]);

    const todayStr = new Date().toISOString().slice(0, 10);
    const sortedMoods = (moods || []).sort((a, b) => b.date.localeCompare(a.date));
    const todayMood = sortedMoods.find(m => m.date === todayStr);
    const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const yMood = sortedMoods.find(m => m.date === yesterdayStr);
    const openToday = (goals || []).filter(g => g.tier === 'today' && g.status === 'open').length;
    const doneToday = (goals || []).filter(g => g.tier === 'today' && g.status === 'done').length;

    const grid = el('div', { className: 'grid-3' });
    grid.appendChild(card({ children: el('div', {},
      el('div', { className: 'ds-caption' }, 'YESTERDAY'),
      el('div', { style: { fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-mono)', margin: 'var(--space-2) 0' } }, yMood ? yMood.mood + '/10 mood' : '—'),
      el('div', { className: 'text-muted' }, yMood?.notes || 'No note logged'),
    ) }));
    grid.appendChild(card({ children: el('div', {},
      el('div', { className: 'ds-caption' }, 'TODAY'),
      el('div', { style: { fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-mono)', margin: 'var(--space-2) 0' } }, todayMood ? todayMood.mood + '/10 mood' : '— not logged'),
      el('div', { className: 'text-muted' }, openToday + ' goals open · ' + doneToday + ' done'),
    ) }));
    grid.appendChild(card({ children: el('div', {},
      el('div', { className: 'ds-caption' }, 'MONEY'),
      el('div', { style: { fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-mono)', margin: 'var(--space-2) 0' } }, bd.cash_personal?.balance_gbp != null ? fmtGbp(bd.cash_personal.balance_gbp) : '—'),
      el('div', { className: 'text-muted' }, 'Personal · PSNM ' + (bd.cash_psnm?.balance_gbp != null ? fmtGbp(bd.cash_psnm.balance_gbp) : '—')),
    ) }));
    wrap.appendChild(grid);

    // 30-day mood trend
    if (sortedMoods.length > 1) {
      wrap.appendChild(el('h2', { className: 'ds-h2', style: { marginTop: 'var(--space-6)' } }, 'Mood last 30 days'));
      const trendWrap = el('div', { style: { display: 'flex', alignItems: 'flex-end', gap: '4px', height: '60px', marginBottom: 'var(--space-4)' } });
      sortedMoods.slice(0, 30).reverse().forEach(m => {
        const h = Math.max(4, (m.mood / 10) * 60);
        trendWrap.appendChild(el('div', {
          title: fmtDate(m.date) + ': mood ' + m.mood,
          style: { flex: '1', height: h + 'px', background: 'var(--text-primary)', borderRadius: '2px', opacity: '0.7', minWidth: '4px', cursor: 'default' }
        }));
      });
      wrap.appendChild(trendWrap);
    }
  } catch(e) {
    wrap.appendChild(emptyState({ icon: '⚠', title: 'Load failed', body: e.message }));
  }
  return wrap;
}

// ── sec-wellness ─────────────────────────────────────────────────────────────
function renderWellness() {
  function routineTab(host) {
    host.innerHTML = '';
    host.appendChild(el('div', { className: 'section-note' },
      'Your structure protects best energy for what moves the needle. Without it, the day eats you alive.'));
    const schedule = [
      ['5:30–6:00am', 'Wake. No phone. Water. Outside.'],
      ['6:00–7:00am', 'Training block.'],
      ['7:00–7:30am', 'Portal briefing + set Top 3.'],
      ['7:30–12:00', 'Deep work — build / house / content.'],
      ['12:00–1:00pm', 'Lunch + 15-min walk.'],
      ['1:00–5:00pm', 'Ops — PSNM, Eternal, admin.'],
      ['5:00–7:00pm', 'Family time — PROTECTED. Phone away.'],
      ['7:00–8:00pm', 'Ben and Sarah time.'],
      ['8:00–9:30pm', 'Content review / planning.'],
      ['9:30–10:00pm', 'Log the day. Wins. Close out.'],
      ['10:00pm', 'No screens. Wind down. Bed.'],
    ];
    schedule.forEach(([time, desc]) => {
      host.appendChild(el('div', { className: 'timeline-item' },
        el('div', { className: 'tl-dot done' }),
        el('div', {},
          el('div', { style: { fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', color: 'var(--text-tertiary)' } }, time),
          el('div', { style: { fontSize: 'var(--text-sm)', marginTop: '2px' } }, desc)
        )
      ));
    });
  }

  function trainingTab(host) {
    host.innerHTML = '';
    const weekly = [
      ['Monday', 'Push — Chest, Shoulders, Triceps'],
      ['Tuesday', 'Cardio — 30 min run or bike'],
      ['Wednesday', 'Pull — Back, Biceps, Rear delts'],
      ['Thursday', 'Active recovery — walk + mobility'],
      ['Friday', 'Legs — Squat, hinge, carry'],
      ['Saturday', 'Functional — outdoor, family activity'],
      ['Sunday', 'Rest — sauna, stretch, recovery'],
    ];
    const grid = el('div', { className: 'grid-2' });
    const schedCard = card({ children: el('div', {},
      el('h3', { className: 'ds-h3' }, 'Weekly structure'),
      ...weekly.map(([day, desc]) => el('div', { style: { display: 'flex', justifyContent: 'space-between', padding: 'var(--space-2) 0', borderBottom: '1px solid var(--border-subtle)', fontSize: 'var(--text-sm)' } },
        el('span', { style: { color: 'var(--text-tertiary)', minWidth: '90px' } }, day),
        el('span', {}, desc)
      ))
    ) });
    grid.appendChild(schedCard);

    // Session log form
    const logCard = card({ children: el('div', { id: 'train-log-host' }, 'Loading…') });
    grid.appendChild(logCard);
    host.appendChild(grid);

    const logHost = logCard.querySelector('#train-log-host');
    logHost.innerHTML = '';
    logHost.appendChild(el('h3', { className: 'ds-h3' }, 'Log session'));
    const actInp = el('input', { className: 'ds-input', placeholder: 'e.g. Push day, 45 min', style: { marginBottom: 'var(--space-3)' } });

      listHost.appendChild(card({ children: el('div', {},

        el('div', { style: { fontSize: 'var(--text-sm)', color: 'var(--text-secondary)', margin: 'var(--space-2) 0', lineHeight: 'var(--leading-loose)' } }, r.insights),

  }

  return wrap;

// ── sec-peanut ────────────────────────────────────────────────────────────────
async function renderPeanut() {
  const wrap = el('div', {});
  wrap.appendChild(el('div', { className: 'section-note' }, 'Peanut is coming on expedition — pet passport status is critical before 1 July 2027.'));

  const rows = await proxy('family_peanut', 'select') || [];
  const config = Object.fromEntries((rows || []).map(r => [r.key, r.value]));

  const fields = [
    ['breed', 'Breed'], ['dob', 'Date of Birth'], ['weight_kg', 'Weight (kg)'],
    ['vet_contact', 'Vet contact'], ['insurance', 'Insurance provider'],
    ['food_brand', 'Food brand'], ['pet_passport_status', 'Pet passport status'],
  ];

  const inputs = {};
  const formGrid = el('div', { className: 'grid-2' });
  fields.forEach(([key, label]) => {
    const inp = el('input', { className: 'ds-input', placeholder: label });
    if (config[key]) inp.value = typeof config[key] === 'string' ? config[key] : JSON.stringify(config[key]);
    inputs[key] = inp;
    formGrid.appendChild(el('div', {}, el('div', { className: 'ds-label' }, label), inp));
  });
  wrap.appendChild(formGrid);

  const saveBtn = button({ variant: 'primary', label: 'Save', style: { marginTop: 'var(--space-4)' }, onClick: async () => {
    saveBtn.disabled = true;
    for (const [key, inp] of Object.entries(inputs)) {
      if (!inp.value.trim()) continue;
      await proxy('family_peanut', 'delete', { match: { key } });
      await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ table:'family_peanut', op:'insert', row: { key, value: inp.value.trim() } }) });
    }
    saveBtn.disabled = false; C.toast({ type: 'success', message: 'Peanut data saved.' });
  } });
  wrap.appendChild(saveBtn);

  // Events log
  wrap.appendChild(el('h2', { className: 'ds-h2', style: { marginTop: 'var(--space-6)' } }, 'Events log (vet, vaccines, weight)'));
  const evtHost = el('div', {});
  wrap.appendChild(evtHost);

  const addEvtRow = el('div', { className: 'form-row', style: { marginBottom: 'var(--space-4)' } });
  const evtTypeInp = el('select', { className: 'ds-input' });
  ['vet','vaccine','grooming','weight'].forEach(t => evtTypeInp.appendChild(el('option', { value: t }, t)));
  const evtDateInp = el('input', { type: 'date', className: 'ds-input', value: new Date().toISOString().slice(0,10) });
  const evtNoteInp = el('input', { className: 'ds-input', placeholder: 'Notes', style: { flex: '1' } });
  const evtNextInp = el('input', { type: 'date', className: 'ds-input', placeholder: 'Next due' });
  const addEvtBtn = button({ variant: 'secondary', size: 'sm', label: 'Add', onClick: async () => {
    addEvtBtn.disabled = true;
    await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table:'family_peanut_events', op:'insert', row: { event_type: evtTypeInp.value, date: evtDateInp.value, notes: evtNoteInp.value || null, next_due_date: evtNextInp.value || null } }) });
    evtNoteInp.value = ''; addEvtBtn.disabled = false; loadEvents();
  } });
  addEvtRow.appendChild(evtTypeInp); addEvtRow.appendChild(evtDateInp); addEvtRow.appendChild(evtNoteInp); addEvtRow.appendChild(evtNextInp); addEvtRow.appendChild(addEvtBtn);
  wrap.insertBefore(addEvtRow, evtHost);

  async function loadEvents() {
    const evts = await proxy('family_peanut_events', 'select') || [];
    evts.sort((a,b) => b.date.localeCompare(a.date));
    evtHost.innerHTML = '';
    if (!evts.length) { evtHost.appendChild(emptyState({ icon: '🐕', title: 'No events logged' })); return; }
    evtHost.appendChild(logTable(evts.slice(0, 20), [
      { label: 'Date', render: r => fmtDate(r.date) },
      { label: 'Type', key: 'event_type' },
      { label: 'Notes', key: 'notes' },
      { label: 'Next due', render: r => fmtDate(r.next_due_date) },
    ]));
  }
  loadEvents();
  return wrap;
}

// ── sec-family-health ─────────────────────────────────────────────────────────
async function renderFamilyHealth() {
  const wrap = el('div', {});
  wrap.appendChild(el('div', { className: 'section-note' }, 'Family health aggregator. Mood trends, upcoming appointments, Pilates progress.'));

  const [moods, sarahMoods, sonEvents, peanutEvents] = await Promise.all([
    proxy('ben_mood_log', 'select'),
    proxy('sarah_today_log', 'select'),
    proxy('family_sons_events', 'select'),
    proxy('family_peanut_events', 'select'),
  ]);

  const grid = el('div', { className: 'grid-2' });

  // Ben mood 30d
  const benMoodsSorted = (moods || []).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 30);
  const benAvg = benMoodsSorted.length ? Math.round(benMoodsSorted.reduce((s,m) => s + m.mood, 0) / benMoodsSorted.length * 10) / 10 : null;
  grid.appendChild(card({ children: el('div', {},
    el('div', { className: 'ds-caption' }, "BEN'S MOOD — 30 DAYS"),
    el('div', { style: { fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-mono)', margin: 'var(--space-2) 0' } }, benAvg != null ? benAvg + '/10 avg' : '—'),
    el('div', { className: 'ds-caption' }, benMoodsSorted.length + ' days logged'),
  ) }));

  // Sarah mood
  const sarahSorted = (sarahMoods || []).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 7);
  const sarahAvg = sarahSorted.length ? Math.round(sarahSorted.reduce((s,m) => s + m.mood, 0) / sarahSorted.length * 10) / 10 : null;
  grid.appendChild(card({ children: el('div', {},
    el('div', { className: 'ds-caption' }, "SARAH'S MOOD — 7 DAYS"),
    el('div', { style: { fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-mono)', margin: 'var(--space-2) 0' } }, sarahAvg != null ? sarahAvg + '/10 avg' : '—'),
    el('div', { className: 'ds-caption' }, sarahSorted.length + ' days logged'),
  ) }));

  wrap.appendChild(grid);

  // Upcoming appointments
  const upcoming = [
    ...(sonEvents || []).filter(e => e.next_due_date && e.next_due_date >= new Date().toISOString().slice(0,10)).map(e => ({ who: 'Boys', type: e.event_type, date: e.next_due_date })),
    ...(peanutEvents || []).filter(e => e.next_due_date && e.next_due_date >= new Date().toISOString().slice(0,10)).map(e => ({ who: 'Peanut', type: e.event_type, date: e.next_due_date })),
  ].sort((a,b) => a.date.localeCompare(b.date));

  wrap.appendChild(el('h2', { className: 'ds-h2', style: { marginTop: 'var(--space-5)' } }, 'Upcoming'));
  if (!upcoming.length) { wrap.appendChild(emptyState({ icon: '📅', title: 'No upcoming appointments' })); }
  else {
    wrap.appendChild(logTable(upcoming.slice(0, 10), [
      { label: 'Who', key: 'who' },
      { label: 'Type', key: 'type' },
      { label: 'Date', render: r => fmtDate(r.date) },
    ]));
  }
  return wrap;
}

// ── Evening Reflection (existing) ─────────────────────────────────────────────
async function renderEveningReflection() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'text-muted', style: { marginBottom: 'var(--space-3)' } }, 'Two taps and two lines.'));
  const mood = { v: null };
  const moodRow = el('div', { className: 'row', style: { gap: 'var(--space-2)', margin: 'var(--space-4) 0', flexWrap: 'wrap' } });
  [1,2,3,4,5].forEach(n => {
    const b = el('button', { className: 'mood-btn', onClick: () => {
      mood.v = n;
      moodRow.querySelectorAll('.mood-btn').forEach((el, i) => el.classList.toggle('sel', i === n - 1));
    } }, String(n));
    moodRow.appendChild(b);
  });
  wrap.appendChild(el('div', { className: 'ds-label' }, 'Mood today'));
  wrap.appendChild(moodRow);
  const oneLine = el('input', { className: 'ds-input', placeholder: 'One line about today', maxlength: '80' });
  const tomorrow = el('input', { className: 'ds-input', placeholder: "Tomorrow's priority", maxlength: '80' });
  const status = el('div', { className: 'ds-caption', style: { marginTop: 'var(--space-3)' } });
  const save = button({ variant: 'primary', label: 'Log', onClick: async () => {
    if (mood.v == null) { status.textContent = 'Pick a mood.'; return; }
    if (!oneLine.value.trim()) { status.textContent = 'Write one line.'; return; }
    const today = new Date().toISOString().slice(0,10);
    await proxy('evening_reflections', 'delete', { match: { reflection_date: today } });
    const r = await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table:'evening_reflections', op:'insert', row: { reflection_date: today, mood_score: mood.v, one_line: oneLine.value.trim(), one_line_reflection: oneLine.value.trim(), tomorrow_priority: tomorrow.value.trim() || null } }) });
    if (r.ok) { C.toast({ type:'success', message: 'Logged.' }); oneLine.value = ''; tomorrow.value = ''; }
    else { status.textContent = 'Save failed.'; }
  } });
  wrap.appendChild(el('div', { className: 'ds-label' }, 'One line today'));
  wrap.appendChild(oneLine);
  wrap.appendChild(el('div', { className: 'ds-label', style: { marginTop: 'var(--space-3)' } }, "Tomorrow's priority"));
  wrap.appendChild(tomorrow);
  wrap.appendChild(el('div', { className: 'row', style: { marginTop: 'var(--space-4)', justifyContent: 'flex-end' } }, save));
  wrap.appendChild(status);
  return wrap;
}

// ── Personal cash log (existing) ──────────────────────────────────────────────
async function renderPersonalCashLog() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'text-muted' }, 'Personal balance over time. Never commingled with PSNM / RBTR / EK.'));
  const inp = el('input', { type: 'number', step: '0.01', className: 'ds-input', placeholder: '£ new balance', style: { maxWidth: '200px' } });
  const note = el('input', { className: 'ds-input', placeholder: 'Note', style: { maxWidth: '280px' } });
  const logBtn = button({ variant: 'primary', label: 'Log', onClick: async () => {
    if (!inp.value) return;
    const r = await fetch('/api/atlas?action=log_cash', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ entity: 'personal', balance_gbp: Number(inp.value), note: note.value || null }) });
    if (r.ok) { inp.value = ''; note.value = ''; C.toast({ type:'success', message: 'Personal cash logged' }); refresh(); }
    else C.toast({ type: 'error', message: 'Log failed' });
  } });
  wrap.appendChild(el('div', { className: 'row', style: { marginBottom: 'var(--space-5)' } }, inp, note, logBtn));
  const tableWrap = el('div', {});
  wrap.appendChild(tableWrap);
  async function refresh() {
    const rows = await proxy('personal_cash_log', 'select') || [];
    rows.sort((a,b) => b.logged_at > a.logged_at ? 1 : -1);
    tableWrap.innerHTML = '';
    if (!rows.length) { tableWrap.appendChild(emptyState({ icon: '💷', title: 'No entries yet' })); return; }
    tableWrap.appendChild(logTable(rows.slice(0,30), [
      { label: 'Date', render: r => new Date(r.logged_at).toLocaleString('en-GB') },
      { label: 'Balance', render: r => fmtGbp(r.balance_gbp) },
      { label: 'Note', key: 'note' },
    ]));
  }
  refresh();
  return wrap;
}
