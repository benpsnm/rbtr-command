<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FINANCIALS · RBTR</title>
<link rel="stylesheet" href="/css/portal.css">
</head>
<body>
<div id="portal-root"></div>

<script src="/js/components.js"></script>
<script src="/js/state.js"></script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-framework.js"></script>

<script>
const C = window.RBTR_Components;
const { el, card, statCard, button, emptyState } = C;

const ENTITIES = [
  { key: 'psnm',     label: 'PSNM',         log: 'psnm_cash_log',     classification: 'internal' },
  { key: 'personal', label: 'Ben Personal', log: 'personal_cash_log', classification: 'internal' },
  { key: 'rbtr',     label: 'RBTR',         log: 'rbtr_fund_log',     classification: 'internal' },
  { key: 'ek',       label: 'EK',           log: 'ek_cash_log',       classification: 'legal_sensitive' },
  { key: 'house',    label: 'House',        log: 'house_cash_log',    classification: 'internal' },
];

// Sarah doesn't see EK (legal_sensitive)
function visibleEntities() {
  const u = window.RBTR_USER;
  const isBen = u?.profile?.role === 'ben';
  return ENTITIES.filter(e => isBen || e.classification !== 'legal_sensitive');
}

function fmtGbp(n) {
  if (n == null || n === '') return '—';
  return '£' + Number(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-GB') : '—'; }

async function latestBalance(tableName) {
  try {
    const r = await fetch('/api/supabase-proxy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table: tableName, op: 'select' })
    });
    if (!r.ok) return null;
    const rows = await r.json();
    if (!Array.isArray(rows) || !rows.length) return null;
    return rows.sort((a,b) => new Date(b.logged_at) - new Date(a.logged_at))[0];
  } catch { return null; }
}

async function logBalance(entityKey, value, note) {
  if (['psnm','personal','rbtr','ek'].includes(entityKey)) {
    const r = await fetch('/api/atlas?action=log_cash', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ entity: entityKey, balance_gbp: Number(value), note: note || null })
    });
    return r.ok;
  }
  // House → direct proxy insert
  const r = await fetch('/api/supabase-proxy', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ table: 'house_cash_log', op: 'insert',
      row: { balance_gbp: Number(value), source: 'manual', note: note || null }})
  });
  return r.ok;
}

// ── Dashboard ──────────────────────────────────────────────────────────────
async function renderDashboard() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'text-muted' },
    'Four (or five) separate entities. Never commingled. Each has its own cash log.'));

  const grid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 'var(--space-3)', marginTop: 'var(--space-4)' } });
  const ents = visibleEntities();
  const latest = await Promise.all(ents.map(e => latestBalance(e.log)));

  ents.forEach((e, i) => {
    const l = latest[i];
    const inp = el('input', { type: 'number', step: '0.01', className: 'ds-input', placeholder: '£ new balance', style: { flex: '1', minWidth: '80px' } });
    const btn = button({ variant: 'primary', size: 'sm', label: 'Log', onClick: async () => {
      if (!inp.value) return;
      btn.disabled = true; btn.textContent = '…';
      const ok = await logBalance(e.key, inp.value);
      btn.disabled = false; btn.textContent = 'Log';
      if (ok) { inp.value = ''; C.toast({ type:'success', message: e.label + ' logged' }); location.hash = '#' + location.hash.replace(/^#/, '') || '#dashboard'; location.reload(); }
      else C.toast({ type:'error', message: 'Log failed' });
    }});
    const c = card({ children: el('div', {},
      el('div', { className: 'ds-caption' }, e.label + (e.classification === 'legal_sensitive' ? ' · LEGAL' : '')),
      el('div', { className: 'mono', style: { fontSize: 'var(--text-2xl)', margin: 'var(--space-2) 0 var(--space-1)' } }, l ? fmtGbp(l.balance_gbp) : '—'),
      el('div', { className: 'ds-caption' }, l ? 'last: ' + fmtDate(l.logged_at) + (l.note ? ' · ' + l.note : '') : 'never logged'),
      el('div', { className: 'row', style: { marginTop: 'var(--space-3)' } }, inp, btn),
    )});
    grid.appendChild(c);
  });
  wrap.appendChild(grid);

  // Recent transactions
  wrap.appendChild(el('h2', { className: 'ds-h2', style: { marginTop: 'var(--space-6)' } }, 'Recent transactions'));
  const txHost = el('div', {});
  wrap.appendChild(txHost);
  try {
    const r = await fetch('/api/supabase-proxy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table: 'financial_transactions', op: 'select' })
    });
    const rows = r.ok ? await r.json() : [];
    if (!Array.isArray(rows) || !rows.length) {
      txHost.appendChild(emptyState({ icon: '📄', title: 'No transactions yet', body: 'Upload a CSV or add manually from an entity page.' }));
    } else {
      rows.sort((a,b) => new Date(b.transaction_date) - new Date(a.transaction_date));
      const tbl = el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 'var(--text-sm)' } });
      tbl.appendChild(el('thead', {}, el('tr', {},
        ...['Date','Entity','Type','Description','Amount'].map(h => el('th', {
          style: { textAlign:'left', padding: 'var(--space-3)', color: 'var(--text-tertiary)', fontSize: 'var(--text-xs)', letterSpacing: 'var(--track-wide)', textTransform: 'uppercase', borderBottom: '1px solid var(--border-subtle)' }
        }, h))
      )));
      const tbody = el('tbody', {});
      rows.slice(0, 30).forEach(row => {
        tbody.appendChild(el('tr', {},
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)' } }, fmtDate(row.transaction_date)),
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)' } }, row.entity || '—'),
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)' } }, row.type || '—'),
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)', color: 'var(--text-secondary)' } }, (row.description || '').slice(0, 60)),
          el('td', { className: 'mono', style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)', textAlign: 'right' } },
            (row.type === 'expense' ? '−' : '+') + fmtGbp(Math.abs(row.amount_gbp))),
        ));
      });
      tbl.appendChild(tbody);
      txHost.appendChild(tbl);
    }
  } catch(e) { txHost.appendChild(emptyState({ icon: '⚠', title: 'Load failed', body: String(e.message || e) })); }

  // Open banking stub
  wrap.appendChild(card({
    className: 'stub',
    children: el('div', {},
      el('div', { className: 'ds-caption' }, 'OPEN BANKING — STUB'),
      el('p', { className: 'text-muted', style: { marginTop: 'var(--space-2)' } },
        'TrueLayer / Plaid integration deferred. Manual + CSV only for now. See OVERNIGHT_BLOCKERS.md §6.'),
    )
  }));

  return wrap;
}

// ── Per-entity cash log detail ─────────────────────────────────────────────
function renderEntity(entityKey) {
  return async () => {
    const wrap = el('div', {});
    const e = ENTITIES.find(x => x.key === entityKey);
    if (!e) return emptyState({ icon: '?', title: 'Unknown entity' });
    if (e.classification === 'legal_sensitive' && window.RBTR_USER?.profile?.role !== 'ben') {
      return emptyState({ icon: '🔒', title: '403 · LEGAL_SENSITIVE', body: 'This entity is Ben-only.' });
    }
    wrap.appendChild(el('h2', { className: 'ds-h2' }, e.label + ' cash log'));
    const tableWrap = el('div', {});
    wrap.appendChild(tableWrap);

    try {
      const r = await fetch('/api/supabase-proxy', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ table: e.log, op: 'select' })
      });
      const rows = r.ok ? await r.json() : [];
      if (!Array.isArray(rows) || !rows.length) {
        tableWrap.appendChild(emptyState({ icon: '💷', title: 'No entries yet', body: 'Log a balance from the Dashboard page.' }));
        return wrap;
      }
      rows.sort((a,b) => new Date(b.logged_at) - new Date(a.logged_at));
      const tbl = el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 'var(--text-sm)' } });
      tbl.appendChild(el('thead', {}, el('tr', {},
        ...['Logged','Balance','Source','Note'].map(h => el('th', {
          style: { textAlign:'left', padding: 'var(--space-3)', color: 'var(--text-tertiary)', fontSize: 'var(--text-xs)', letterSpacing: 'var(--track-wide)', textTransform: 'uppercase', borderBottom: '1px solid var(--border-subtle)' }
        }, h))
      )));
      const tbody = el('tbody', {});
      rows.forEach(row => {
        tbody.appendChild(el('tr', {},
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)' } }, new Date(row.logged_at).toLocaleString('en-GB')),
          el('td', { className: 'mono', style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)' } }, fmtGbp(row.balance_gbp)),
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)', color: 'var(--text-secondary)' } }, row.source || '—'),
          el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)', color: 'var(--text-secondary)' } }, row.note || ''),
        ));
      });
      tbl.appendChild(tbody);
      tableWrap.appendChild(tbl);
    } catch(err) { tableWrap.appendChild(emptyState({ icon: '⚠', title: 'Error', body: String(err.message || err) })); }
    return wrap;
  };
}

// ── Upload statement stub ──────────────────────────────────────────────────
function renderUpload() {
  const wrap = el('div', {});
  wrap.appendChild(el('h2', { className: 'ds-h2' }, 'Upload bank statement'));
  wrap.appendChild(el('p', { className: 'text-muted' }, 'Monzo / Starling / Barclays / HSBC CSV export formats supported. Parser runs in your browser.'));

  const fileInput = el('input', { type: 'file', accept: '.csv', className: 'ds-input', style: { marginTop: 'var(--space-4)' } });
  const status = el('div', { className: 'ds-caption', style: { marginTop: 'var(--space-3)' } });
  const parseBtn = button({ variant: 'primary', label: 'Parse', onClick: async () => {
    const file = fileInput.files[0];
    if (!file) { status.textContent = 'Pick a CSV first.'; return; }
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(Boolean);
    if (lines.length < 2) { status.textContent = 'Empty file.'; return; }
    const header = lines[0].toLowerCase().split(',');
    const dateIdx = header.findIndex(h => /date/.test(h));
    const amtIdx = header.findIndex(h => /amount/.test(h));
    const descIdx = header.findIndex(h => /description|name|merchant/.test(h));
    if (dateIdx < 0 || amtIdx < 0) { status.textContent = 'Could not detect Date + Amount columns.'; return; }
    const parsed = lines.slice(1).map(l => {
      const cols = l.split(',');
      return {
        transaction_date: cols[dateIdx],
        amount_gbp: Number(cols[amtIdx]),
        description: descIdx >= 0 ? cols[descIdx] : '',
        type: Number(cols[amtIdx]) > 0 ? 'income' : 'expense',
        source: 'csv',
      };
    }).filter(r => !isNaN(r.amount_gbp));
    status.textContent = 'Parsed ' + parsed.length + ' rows. Bulk-insert path: TODO (next pass). For now, add manually via entity pages.';
  }});
  wrap.appendChild(fileInput);
  wrap.appendChild(el('div', { className: 'row', style: { marginTop: 'var(--space-3)' } }, parseBtn));
  wrap.appendChild(status);
  return wrap;
}

// ── Portal config ──────────────────────────────────────────────────────────
const FINANCIALS_PORTAL = {
  id: 'financials',
  name: 'FINANCIALS',
  emoji: '💷',
  tagline: 'Separate entities. Never commingled.',
  access: ['ben', 'sarah'],
  liveStatFetcher: async () => {
    const count = visibleEntities().length;
    return count + ' entities';
  },
  sections: [
    { id: 'dashboard',     group: 'OVERVIEW',    label: 'Overview',        emoji: '📊', render: renderDashboard, default: true },
    { id: 'psnm',          group: 'PER ENTITY',  label: 'PSNM',            emoji: '🏭', render: renderEntity('psnm') },
    { id: 'ben-personal',  group: 'PER ENTITY',  label: 'Ben Personal',    emoji: '💵', render: renderEntity('personal') },
    { id: 'rbtr',          group: 'PER ENTITY',  label: 'RBTR',            emoji: '🚛', render: renderEntity('rbtr') },
    { id: 'ek',            group: 'PER ENTITY',  label: 'EK',              emoji: '🔩', render: renderEntity('ek') },
    { id: 'house',         group: 'PER ENTITY',  label: 'House',           emoji: '🏠', render: renderEntity('house') },
    { id: 'all-tx',        group: 'LEDGER',      label: 'All Transactions',emoji: '📜', render: async () => renderDashboard() }, // same data, can specialise later
    { id: 'upload',        group: 'LEDGER',      label: 'Upload Statement',emoji: '📤', render: renderUpload },
    { id: 'runway',        group: 'FORECASTING', label: 'Runway',          emoji: '⏳', render: () => emptyState({ icon: '⏳', title: 'Runway projections coming', body: 'Cash on hand ÷ 30-day burn rate per entity. Next pass.' }) },
    { id: 'burn',          group: 'FORECASTING', label: 'Burn Rate',       emoji: '🔥', render: () => emptyState({ icon: '🔥', title: 'Burn rate coming', body: 'Per-entity monthly burn from financial_transactions.' }) },
    { id: 'pipeline',      group: 'FORECASTING', label: 'Pipeline Value',  emoji: '📈', render: () => emptyState({ icon: '📈', title: 'Pipeline value coming', body: 'Expected income from quoted-but-unsigned PSNM leads × probability.' }) },
  ],
};

window.RBTR_Portal.mount(FINANCIALS_PORTAL);
</script>
</body>
</html>
