<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PSNM · RBTR</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
  /* Portal-local overrides for ported legacy section — use tokens, no colour leaks */
  #sec-psnm-warm .g4 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: var(--space-3);

  #sec-psnm-warm .card {
    background: var(--bg-secondary);

    border-radius: var(--radius-lg);
    padding: var(--space-4);
  }
  #sec-psnm-warm .ct {
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    letter-spacing: var(--track-ultra);
    text-transform: uppercase;
    margin-bottom: var(--space-2);
  }
  #sec-psnm-warm .cv {
    font-family: var(--font-mono);

    line-height: var(--leading-tight);
    margin-bottom: var(--space-1);
  }
  #sec-psnm-warm .cs {
    font-size: var(--text-xs);
    color: var(--text-secondary);
  }
  #sec-psnm-warm .sdiv {
    margin: var(--space-5) 0 var(--space-3);
    padding-bottom: var(--space-2);
    border-bottom: 1px solid var(--border-subtle);
  }
  #sec-psnm-warm .sdiv h3 {
    margin: 0;

    letter-spacing: var(--track-ultra);
    text-transform: uppercase;

    font-weight: 600;
  }
  #sec-psnm-warm .sl { color: var(--text-tertiary); font-size: var(--text-sm); }
  #sec-psnm-warm .ph { margin-bottom: var(--space-4); }
  #sec-psnm-warm .ph-titles .pt {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    letter-spacing: var(--track-tight);
    margin-bottom: var(--space-1);
  }
  #sec-psnm-warm .ph-titles .ps {
    color: var(--text-secondary);
    font-size: var(--text-sm);
  }
  #sec-psnm-warm .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: var(--space-4);
  }
  #sec-psnm-warm .tab {
    padding: var(--space-3) var(--space-4);
    cursor: pointer;
    font-size: var(--text-sm);
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    transition: all var(--transition-fast);
  }

    color: var(--text-primary);
    border-bottom-color: var(--border-strong);
  }
  #sec-psnm-warm .btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-4);
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  #sec-psnm-warm .btn:hover { border-color: var(--border-strong); }
  #sec-psnm-warm .btn.pri {
    background: var(--text-primary);
    color: var(--bg-primary);
  }
  #sec-psnm-warm .btn.sm {
    padding: var(--space-1) var(--space-3);
    font-size: var(--text-xs);
  }
  #sec-psnm-warm input,
  #sec-psnm-warm textarea,
  #sec-psnm-warm select {
    width: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    font-family: var(--font-body);
  }
  #sec-psnm-warm textarea { min-height: 140px; resize: vertical; font-family: var(--font-mono); font-size: var(--text-sm); }
</style>

<body>
<div id="portal-root"></div>

<script src="/js/components.js"></script>
<script src="/js/state.js"></script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-framework.js"></script>

<!-- PSNM portal config -->
<script>
const C = window.RBTR_Components;
const { el, card, statCard, button, emptyState } = C;

// ── Dashboard render ────────────────────────────────────────────────────────
async function renderPsnmDashboard() {
  // Hero stats
  const wrap = el('div', {});
  const stats = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 'var(--space-3)', marginBottom: 'var(--space-5)' }
  });
  stats.appendChild(statCard({ emoji: '📦', label: 'Pallets signed', value: '—', sub: '/912 to break-even' }));
  stats.appendChild(statCard({ emoji: '💷', label: 'PSNM cash', value: '—', sub: 'business account' }));
  stats.appendChild(statCard({ emoji: '🔥', label: 'Hot leads', value: '—', sub: 'from warm list' }));
  stats.appendChild(statCard({ emoji: '📞', label: 'Calls today', value: '—', sub: 'Atlas queue' }));
  wrap.appendChild(stats);

  // Load live
  try {
    const r = await fetch('/api/briefing-data');
    const j = await r.json();
    const d = j.data || {};
    const pallets = d.psnm_pallets_current;
    const cash = d.cash_psnm?.balance_gbp;
    const gap = d.psnm_pallets_to_breakeven;
    const labels = stats.querySelectorAll('.ds-stat .value');
    if (labels[0]) labels[0].textContent = pallets != null ? pallets : '—';
    if (labels[1]) labels[1].textContent = cash != null ? '£' + Number(cash).toLocaleString() : '—';
    // hot + calls pulled later via supabase-proxy
  } catch(e) {}

  // Recent enquiries
  wrap.appendChild(el('h2', { className: 'ds-h2' }, 'Recent enquiries'));
  const listWrap = el('div', { style: { display: 'grid', gap: 'var(--space-2)' } });
  try {
    const r = await fetch('/api/supabase-proxy', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ table: 'psnm_enquiries', op: 'select' })
    });
    const rows = r.ok ? await r.json() : [];
    if (Array.isArray(rows) && rows.length) {
      rows.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      rows.slice(0, 10).forEach(row => {
        listWrap.appendChild(card({
          children: el('div', { className: 'row between' },
            el('div', {},
              el('div', { style: { fontWeight: '600' } }, row.company || '(unnamed)'),
              el('div', { className: 'ds-caption' },
                [row.contact_name, row.phone, row.pallets ? row.pallets + ' pallets' : null].filter(Boolean).join(' · ')),
            ),
            el('span', { className: 'ds-badge ' + (row.temperature || '') },
              (row.temperature || 'unknown').toUpperCase()),
          )
        }));
      });
    } else {
      listWrap.appendChild(emptyState({ icon: '📬', title: 'No enquiries yet', body: 'Paste a WhichWarehouse brief in Warm Leads to bulk-import.' }));
    }
  } catch(e) {
    listWrap.appendChild(emptyState({ icon: '⚠', title: 'Couldn\'t load', body: String(e.message || e) }));
  }
  wrap.appendChild(listWrap);
  return wrap;
}

// ── Warm leads render ───────────────────────────────────────────────────────
// Clones the proven legacy #sec-psnm-warm markup and loads the PSNM_WARM module.
// Module is self-contained: reads/writes its own DOM nodes by ID.
async function renderWarmLeads() {
  // Load PSNM_WARM module on demand
  if (!window.PSNM_WARM) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = '/js/psnm-warm.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // Inject full warm-leads HTML (copied verbatim from legacy)
  const wrap = el('div', { id: 'psnm-warm-host' });
  wrap.innerHTML = `
<section class="section" id="sec-psnm-warm">
  <div class="ph">
    <div class="ph-titles">
      <div class="pt">🔥 PSNM WARM LEADS</div>
      <div class="ps">Warm first — every lead Ben's ever spoken to, ranked by temperature + engagement</div>
    </div>
  </div>
  <div class="g4" style="margin-bottom:18px">
    <div class="card"><div class="ct">🔥 HOT</div><div class="cv" id="pw-count-hot">—</div><div class="cs">replied / recently quoted</div></div>
    <div class="card"><div class="ct">🌡 WARM</div><div class="cv" id="pw-count-warm">—</div><div class="cs">enquiry / recent contact</div></div>
    <div class="card"><div class="ct">❄ COLD</div><div class="cv" id="pw-count-cold">—</div><div class="cs">seeded outreach list</div></div>
    <div class="card"><div class="ct">QUOTES PENDING</div><div class="cv" id="pw-count-quotes">—</div><div class="cs">sent, no reply yet</div></div>
  </div>
  <div class="sdiv"><h3>IMPORT — PASTE &amp; EXTRACT</h3></div>
  <div class="tab-bar" id="pw-import-tabs">
    <div class="tab active" data-t="ww" onclick="PSNM_WARM.tab('ww')">WhichWarehouse Brief</div>
    <div class="tab" data-t="quotes" onclick="PSNM_WARM.tab('quotes')">Past Quote Emails</div>
    <div class="tab" data-t="manual" onclick="PSNM_WARM.tab('manual')">Manual Lead</div>
  </div>
  <div class="card" style="margin-bottom:18px" id="pw-import-panel">
    <div class="sl">Loading panel…</div>
  </div>
  <div id="pw-preview" style="display:none;margin-bottom:18px"></div>
  <div class="sdiv"><h3>RANKED LIST — WARM FIRST</h3></div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn sm pri" onclick="PSNM_WARM.load()">↻ Refresh</button>
    <button class="btn sm pri" onclick="PSNM_WARM.filter('all')" data-filter="all">All</button>
    <button class="btn sm" onclick="PSNM_WARM.filter('hot')" data-filter="hot">🔥 Hot</button>
    <button class="btn sm" onclick="PSNM_WARM.filter('warm')" data-filter="warm">🌡 Warm</button>
    <button class="btn sm" onclick="PSNM_WARM.filter('cold')" data-filter="cold">❄ Cold</button>
    <button class="btn sm" onclick="PSNM_WARM.filter('dead')" data-filter="dead">☠ Dead</button>
  </div>
  <div id="pw-list" style="display:flex;flex-direction:column;gap:10px">
    <div class="card"><div class="sl">Click ↻ Refresh to load, or paste a brief above and extract.</div></div>
  </div>
</section>`;

  // Trigger module init after DOM injection
  setTimeout(() => {
    try {
      window.PSNM_WARM.tab('ww');

    } catch(e) { console.warn('[psnm-warm] init', e); }

// ── Workstream B helpers ─────────────────────────────────────────────────────

function proxyPsnm(table, op, extra = {}) {
  return fetch('/api/supabase-proxy', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ table, op, ...extra })
  }).then(r => r.ok ? r.json() : []);
}

// Priority scoring engine
// S Yorkshire postcodes that get proximity boost
const S_YORKSHIRE_PREFIXES = ['S6','S61','S62','S63','S64','S65','S66','S7','S71','S72','S73','S74','S75','DN1','DN2','DN3','DN4','DN5','DN6','DN7','DN8','DN9','DN10','DN11','DN12'];
// Industries excluded: food (contamination), hazmat (regulations), temp-sensitive (no cold-store)
const EXCLUDED_INDUSTRIES = ['food','foodstuff','frozen','chilled','cold chain','temperature sensitive','pharmaceutical','pharma','hazmat','hazardous','chemical','cosmetic','fmcg','explosive'];

function scoreLeads(leads) {
  return leads.map(lead => {
    let score = 0;
    const now = new Date();
    const lastContact = lead.last_contact_date ? new Date(lead.last_contact_date) : null;
    const daysSince = lastContact ? Math.floor((now - lastContact) / 86400000) : 999;

    // Hard exclusion: food/hazmat/temp-sensitive — we don't take them
    const industry = (lead.industry || lead.goods_description || lead.company || '').toLowerCase();
    if (EXCLUDED_INDUSTRIES.some(kw => industry.includes(kw))) {
      return { ...lead, score: -1000, excluded: true };
    }

    // Engagement signals
    if (lead.status === 'quote_opened_no_reply') score += 40;
    if (lead.temperature === 'hot' && daysSince > 3) score += 35;
    if (lead.temperature === 'warm' && daysSince > 5) score += 25;
    if (lead.temperature === 'cold' && lead.source === 'whichwarehouse') score += 15;
    if (daysSince < 7 && lead.status === 'replied') score += 50;
    if (lead.last_contact_type === 'voicemail') score += 30;
    if (!lead.last_contact_date && (lead.tier === 1 || lead.tier === 2)) score += 20;

    // Geographic proximity: S Yorkshire postcodes (within ~20 miles of Hellaby)
    const postcode = (lead.postcode || lead.post_code || '').toUpperCase().replace(/\s/g, '');
    if (S_YORKSHIRE_PREFIXES.some(p => postcode.startsWith(p))) score += 20;

    // Pallet count: neutral weighting — no size tier discrimination
    // (removed 1.5x bulk boost; capacity 1,602 accommodates all sizes equally)

    return { ...lead, score };
  }).sort((a, b) => b.score - a.score);
}

async function renderAtlasPriority() {
  const wrap = el('div', {});
  const C = window.RBTR_Components;

  let leads = [];
  try {
    leads = await proxyPsnm('psnm_warm_leads', 'select', { order: { column: 'created_at', ascending: false } });
  } catch(e) {}
  if (!Array.isArray(leads) || !leads.length) {
    wrap.appendChild(C.emptyState({ icon: '📞', title: 'No leads in queue', body: 'Add warm leads to generate your daily call queue.' }));
    return wrap;
  }

  const scored = scoreLeads(leads);
  const today = scored.slice(0, 20);

  const header = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'var(--space-4)' } });
  header.appendChild(el('div', {},
    el('div', { style: { fontSize:'var(--text-lg)', fontWeight:'600' } }, 'TODAY\'S CALL QUEUE'),
    el('div', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', fontFamily:'var(--font-mono)' } }, today.length + ' calls · refreshed ' + new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }))
  ));
  header.appendChild(C.button({ label: '↻ Refresh', size:'sm', onClick: async () => { wrap.innerHTML = ''; wrap.appendChild(await renderAtlasPriority()); } }));
  wrap.appendChild(header);

  const tempCls = { hot: 'pill-hot', warm: 'pill-warm', cold: 'pill-cold' };
  const actionMap = {
    hot: 'Call now',
    warm: 'Call or email',
    cold: 'Email first',
    quote_opened_no_reply: 'Call — they opened the quote',
    voicemail: 'Follow-up call',
  };

  today.forEach((lead, i) => {
    const expanded = i < 5;
    const lastContact = lead.last_contact_date ? new Date(lead.last_contact_date) : null;
    const daysSince = lastContact ? Math.floor((new Date() - lastContact) / 86400000) : null;

    const c = el('div', { style: { padding:'var(--space-3)', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-sm)', marginBottom:'var(--space-2)', background: i === 0 ? 'rgba(255,255,255,.03)' : '' } });

    const top = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'flex-start' } });
    const left = el('div', {});
    left.appendChild(el('div', { style: { fontWeight:'600', marginBottom:'4px' } },
      el('span', { style: { fontFamily:'var(--font-mono)', fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginRight:'var(--space-2)' } }, '#' + (i+1)),
      lead.company || lead.contact_name || 'Unknown'
    ));
    left.appendChild(el('div', { style: { display:'flex', gap:'var(--space-2)', flexWrap:'wrap' } },
      el('span', { style: { fontFamily:'var(--font-mono)', fontSize:'var(--text-xs)', color:'var(--text-secondary)' } }, 'Score: ' + lead.score),
      lead.temperature ? el('span', { className: 'ds-badge ' + (lead.temperature || '') }, lead.temperature.toUpperCase()) : el('span'),
      lead.pallets_count ? el('span', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)' } }, lead.pallets_count + ' pallets') : el('span'),
      lead.tier ? el('span', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)' } }, 'T' + lead.tier) : el('span')
    ));
    top.appendChild(left);

    const right = el('div', { style: { display:'flex', gap:'var(--space-2)', flexShrink:'0' } });
    if (lead.phone) right.appendChild(el('a', { href: 'tel:' + lead.phone, style: { display:'inline-flex', alignItems:'center', padding:'4px 10px', border:'1px solid var(--border-subtle)', borderRadius:'var(--radius-sm)', fontSize:'var(--text-xs)', color:'var(--text-primary)', fontFamily:'var(--font-mono)', textDecoration:'none' } }, '📞 Call'));
    top.appendChild(right);
    c.appendChild(top);

    if (expanded) {
      const details = el('div', { style: { marginTop:'var(--space-3)', paddingTop:'var(--space-2)', borderTop:'1px solid var(--border-subtle)' } });

      if (lead.contact_name) details.appendChild(el('div', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', marginBottom:'4px' } }, 'Contact: ' + lead.contact_name));
      if (lastContact) details.appendChild(el('div', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', marginBottom:'4px' } }, 'Last contact: ' + lastContact.toLocaleDateString('en-GB') + (daysSince !== null ? ' (' + daysSince + ' days ago)' : '') + (lead.last_contact_type ? ' via ' + lead.last_contact_type : '')));

      const action = el('div', { style: { marginBottom:'var(--space-2)' } });
      const actionText = lead.status === 'quote_opened_no_reply' ? actionMap.quote_opened_no_reply : lead.last_contact_type === 'voicemail' ? actionMap.voicemail : actionMap[lead.temperature] || 'Contact';
      action.appendChild(el('span', { style: { fontSize:'var(--text-sm)', fontWeight:'600' } }, '→ ' + actionText));
      details.appendChild(action);

      if (lead.notes) details.appendChild(el('div', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', background:'var(--bg-secondary)', padding:'var(--space-2)', borderRadius:'var(--radius-sm)', marginBottom:'var(--space-2)' } }, lead.notes));

      const logBtn = C.button({ label: 'Log outcome', size: 'sm', onClick: async () => {
        const outcome = prompt('Outcome (called/no answer/voicemail/meeting booked/not interested/quote sent):');
        if (!outcome) return;
        const nextDate = prompt('Next contact date (YYYY-MM-DD or leave blank):');
        try {
          await proxyPsnm('psnm_warm_leads', 'update', {
            filters: [{ column: 'id', op: 'eq', value: lead.id }],
            updates: {
              last_contact_date: new Date().toISOString().split('T')[0],
              last_contact_type: 'call',
              next_contact_date: nextDate || null,
              notes: (lead.notes ? lead.notes + '\n' : '') + new Date().toLocaleDateString('en-GB') + ': ' + outcome,
              updated_at: new Date().toISOString(),
            }
          });
          C.toast({ message: 'Outcome logged', type: 'success' });
          c.style.opacity = '.4';
        } catch(e) { C.toast({ message: 'Log failed', type: 'error' }); }
      }});
      details.appendChild(logBtn);
      c.appendChild(details);
    }

    wrap.appendChild(c);
  });
  return wrap;
}

async function renderPsnmPerformance() {
  const wrap = el('div', {});
  const C = window.RBTR_Components;

  let leads = [], enquiries = [], quotes = [];
  try {
    [leads, enquiries, quotes] = await Promise.all([
      proxyPsnm('psnm_warm_leads', 'select'),
      proxyPsnm('psnm_enquiries', 'select'),
      proxyPsnm('psnm_quotes', 'select'),
    ]);
  } catch(e) {}

  const now = new Date();
  const weekAgo = new Date(now - 7 * 86400000);
  const monthAgo = new Date(now - 30 * 86400000);

  const contacted = Array.isArray(leads) ? leads.filter(l => l.last_contact_date) : [];
  const contactedWeek = contacted.filter(l => new Date(l.last_contact_date) >= weekAgo);
  const hot = Array.isArray(leads) ? leads.filter(l => l.temperature === 'hot') : [];
  const warm = Array.isArray(leads) ? leads.filter(l => l.temperature === 'warm') : [];
  const cold = Array.isArray(leads) ? leads.filter(l => l.temperature === 'cold') : [];
  const customers = Array.isArray(enquiries) ? enquiries.filter(e => e.status === 'won') : [];
  const totalPallets = Array.isArray(enquiries) ? enquiries.filter(e => e.status === 'won').reduce((a, e) => a + (e.pallets || 0), 0) : 0;

  const statsGrid = el('div', { style: { display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px,1fr))', gap:'var(--space-3)', marginBottom:'var(--space-5)' } });
  [
    { emoji: '📞', label: 'Contacts this week', value: contactedWeek.length },
    { emoji: '🔥', label: 'Hot leads', value: hot.length },
    { emoji: '🌡', label: 'Warm leads', value: warm.length },
    { emoji: '❄', label: 'Cold leads', value: cold.length },
    { emoji: '✅', label: 'Won (all time)', value: customers.length },
    { emoji: '📦', label: 'Pallets committed', value: totalPallets + '/912' },
  ].forEach(s => statsGrid.appendChild(C.statCard(s)));
  wrap.appendChild(statsGrid);

  // Conversion funnel
  const totalLeads = Array.isArray(leads) ? leads.length : 0;
  const quoteCount = Array.isArray(quotes) ? quotes.length : 0;
  const funnelCard = C.card({ children: el('div', {}) });
  const fb = funnelCard.querySelector('div');
  fb.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-3)' } }, 'CONVERSION FUNNEL'));
  const funnel = [
    { stage: 'Leads in system', count: totalLeads },
    { stage: 'Contacted', count: contacted.length },
    { stage: 'Hot / Warm', count: hot.length + warm.length },
    { stage: 'Quotes sent', count: quoteCount },
    { stage: 'Won', count: customers.length },
  ];
  funnel.forEach((f, i) => {
    const pct = i === 0 ? 100 : Math.round((f.count / (funnel[0].count || 1)) * 100);
    const row = el('div', { style: { marginBottom:'var(--space-2)' } });
    row.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', fontSize:'var(--text-sm)', marginBottom:'4px' } },
      el('span', {}, f.stage),
      el('span', { style: { fontFamily:'var(--font-mono)' } }, f.count + (i > 0 ? ' (' + pct + '%)' : ''))
    ));
    const bar = el('div', { style: { height:'4px', background:'var(--bg-secondary)', borderRadius:'2px', overflow:'hidden' } });
    bar.appendChild(el('div', { style: { height:'100%', width: pct + '%', background:'var(--text-primary)', borderRadius:'2px' } }));
    row.appendChild(bar);
    fb.appendChild(row);
  });
  wrap.appendChild(funnelCard);
  return wrap;
}

async function renderPsnmTemplates() {
  const wrap = el('div', {});
  const C = window.RBTR_Components;

  let emailTemplates = [], callScripts = [];
  try {
    [emailTemplates, callScripts] = await Promise.all([
      proxyPsnm('psnm_email_templates', 'select'),
      proxyPsnm('psnm_call_scripts', 'select'),
    ]);
  } catch(e) {}

  if (!Array.isArray(emailTemplates)) emailTemplates = [];
  if (!Array.isArray(callScripts)) callScripts = [];

  // Email templates section

// ── Canonical pricing calculator — reads from offer_json, no hardcoded prices ─
function calcPsnmQuote(pallets, durationWeeks, turnsPerYear, offer) {
  const tiers = offer.rate_tiers || [];
  const handlingIn = Number(offer.handling_in_rate) || 3.50;
  const handlingOut = Number(offer.handling_out_rate) || 3.50;
  const onboardingFee = Number(offer.onboarding_fee) || 50;
  const waiverAt = Number(offer.onboarding_waiver_threshold) || 50;
  const minPallets = Number(offer.min_pallets) || 5;
  const minWeeks = Number(offer.min_weeks) || 4;

  const billedPallets = Math.max(pallets, minPallets);
  const billedWeeks = Math.max(durationWeeks, minWeeks);

  let storageRate = tiers.length ? tiers[tiers.length - 1].rate_per_pallet_week : 3.95;
  let tierLabel = '';
  for (const t of tiers) {
    if (t.range_max === null || billedPallets <= t.range_max) {
      storageRate = Number(t.rate_per_pallet_week);
      tierLabel = t.label || '';
      break;
    }
  }

  const storageWeekly = billedPallets * storageRate;
  const storagePeriod = storageWeekly * billedWeeks;
  const periodFraction = billedWeeks / 52;
  const annualMoves = billedPallets * turnsPerYear;
  const inMoves = Math.ceil(annualMoves * periodFraction);
  const outMoves = Math.ceil(annualMoves * periodFraction);
  const handlingPeriod = (inMoves * handlingIn) + (outMoves * handlingOut);
  const handlingAnnual = (annualMoves * handlingIn) + (annualMoves * handlingOut);
  const onboarding = billedPallets >= waiverAt ? 0 : onboardingFee;
  const totalPeriod = storagePeriod + handlingPeriod + onboarding;
  const monthlyEstimate = (storagePeriod / billedWeeks) * 4.33;
  const annualTotal = storageWeekly * 52 + handlingAnnual + onboarding;

  return {
    billedPallets, billedWeeks, storageRate, tierLabel,
    storageWeekly, storagePeriod,
    inMoves, outMoves, handlingIn, handlingOut, handlingPeriod,
    onboarding, totalPeriod, monthlyEstimate, annualTotal,
    minimumPalletApplied: pallets < minPallets,
    minimumWeekApplied: durationWeeks < minWeeks,
  };
}

  hb.appendChild(t);
  wrap.appendChild(histCard);
  return wrap;
}

// ── Generic table render helper ─────────────────────────────────────────────
async function renderList(table, { empty } = {}) {
  const wrap = el('div', {});
  wrap.appendChild(el('h2', { className: 'ds-h2' }, table.replace(/_/g, ' ')));
  try {
    const r = await fetch('/api/supabase-proxy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table, op: 'select' })
    });
    if (!r.ok) { wrap.appendChild(emptyState({ icon: '⚠', title: 'Load failed', body: 'HTTP ' + r.status })); return wrap; }
    const rows = await r.json();
    if (!Array.isArray(rows) || !rows.length) {
      wrap.appendChild(emptyState({ icon: '·', title: 'Empty', body: empty || 'No rows yet.' }));
      return wrap;
    }
    // Render a compact table view
    const keys = Object.keys(rows[0]).filter(k => !['id','created_at','updated_at'].includes(k)).slice(0, 6);
    const table_el = el('div', { style: { overflowX: 'auto', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)' } });
    const tbl = el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: 'var(--text-sm)' } });
    const thead = el('thead', {},
      el('tr', {}, ...keys.map(k => el('th', { style: { textAlign:'left', padding: 'var(--space-3)', color: 'var(--text-tertiary)', fontSize: 'var(--text-xs)', letterSpacing: 'var(--track-wide)', textTransform: 'uppercase', borderBottom: '1px solid var(--border-subtle)' } }, k)))
    );
    const tbody = el('tbody', {},
      ...rows.slice(0, 50).map(r => el('tr', {},
        ...keys.map(k => el('td', { style: { padding: 'var(--space-3)', borderBottom: '1px solid var(--border-subtle)' } },
          r[k] == null ? '—' : (typeof r[k] === 'object' ? JSON.stringify(r[k]).slice(0, 60) : String(r[k]).slice(0, 80))
        ))
      ))
    );
    tbl.appendChild(thead); tbl.appendChild(tbody);
    table_el.appendChild(tbl);
    wrap.appendChild(table_el);
    wrap.appendChild(el('div', { className: 'ds-caption', style: { marginTop: 'var(--space-3)' } }, rows.length + ' rows'));
  } catch(e) {
    wrap.appendChild(emptyState({ icon: '⚠', title: 'Error', body: String(e.message || e) }));
  }
  return wrap;
}

// ── Offer config render — shows full canonical pricing ──────────────────────
async function renderOfferConfig() {
  const wrap = el('div', {});
  const C = window.RBTR_Components;
  wrap.appendChild(el('h2', { className: 'ds-h2' }, 'Canonical Pricing & Offer Config'));
  try {
    const r = await fetch('/api/supabase-proxy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table: 'psnm_offer_config', op: 'select' }),
    });
    const rows = await r.json();
    const active = (rows || []).find(r => r.active) || (rows || [])[0];
    if (!active) { wrap.appendChild(C.emptyState({ icon: '💰', title: 'No offer config', body: 'Check psnm_offer_config.' })); return wrap; }
    const o = active.offer_json || {};
    const row = (k, v) => {
      const d = el('div', { style:'display:flex;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle);align-items:flex-start' });
      d.append(
        el('div', { style:'width:200px;flex-shrink:0;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-tertiary);padding-top:2px' }, k),
        el('div', { style:'flex:1;font-size:var(--text-sm)' }, v || '—'),
      );
      return d;
    };
    const sec = (title) => el('div', { className:'ds-caption', style:'margin:var(--space-4) 0 var(--space-2)' }, title);
    const body = el('div', {});

    // Storage tiers
    body.appendChild(sec('STORAGE RATES'));
    (o.rate_tiers || []).forEach(t => body.appendChild(row(t.label, `£${Number(t.rate_per_pallet_week).toFixed(2)} / pallet / week`)));

    // Handling
    body.appendChild(sec('HANDLING FEES'));
    body.appendChild(row('GOODS-IN', `£${Number(o.handling_in_rate||3.50).toFixed(2)} per pallet`));
    body.appendChild(row('GOODS-OUT', `£${Number(o.handling_out_rate||3.50).toFixed(2)} per pallet`));

    // Admin
    body.appendChild(sec('ADMIN'));
    body.appendChild(row('ONBOARDING FEE', `£${Number(o.onboarding_fee||50).toFixed(2)} — waived when pallets ≥ ${o.onboarding_waiver_threshold||50}`));
    body.appendChild(row('MINIMUM PALLETS', String(o.min_pallets || 5)));
    body.appendChild(row('MINIMUM TERM', `${o.min_weeks || 4} weeks billed minimum`));
    body.appendChild(row('NOTICE PERIOD', `${o.notice_period_days || 30} days after minimum term`));
    body.appendChild(row('PAYMENT TERMS', o.payment_terms || 'net_30'));

    // Offer positioning
    body.appendChild(sec('OFFER POSITIONING'));
    body.appendChild(row('HEADLINE', o.headline));
    body.appendChild(row('DREAM OUTCOME', o.dream_outcome));
    body.appendChild(row('RISK REVERSAL', o.risk_reversal));

    // T&Cs
    body.appendChild(sec('T&C CLAUSES (MANDATORY ON EVERY QUOTE)'));
    body.appendChild(row('SELF-INSURANCE', o.tc_self_insurance));
    body.appendChild(row('FIRE SEPARATION', o.tc_fire_separation));

    body.appendChild(el('div', { style:'font-size:10px;color:var(--text-tertiary);margin-top:var(--space-3)' }, `Config v${active.version || 1} — single source of truth for all pricing`));
    wrap.appendChild(C.card({ children: body }));
  } catch(e) {
    wrap.appendChild(C.emptyState({ icon: '⚠', title: 'Load failed', body: String(e.message || e) }));
  }
  return wrap;
}
