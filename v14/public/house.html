<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/portal.css">
</head><body>
<div id="portal-root"></div>
<script>
window.PORTAL_CONFIG = {
  key: 'house', title: 'HOUSE', emoji: '🏠',
  tagline: 'Barnsley property · ready to rent.',
  sidebarGroups: [
    { heading: 'PROPERTY', items: [
      { label: 'Overview', hash: 'house' },
      { label: 'Jobs', hash: 'house-jobs' },
      { label: 'Renovation Plan', hash: 'renovation' },
    ]},
    { heading: 'AIRBNB', items: [
      { label: 'Listing', hash: 'airbnb' },
      { label: 'Bookings', hash: 'airbnb-bookings' },
      { label: 'Certs', hash: 'airbnb-certs' },
      { label: 'SOPs', hash: 'airbnb-sops' },
      { label: 'Photography', hash: 'airbnb-photo' },
      { label: 'Revenue', hash: 'airbnb-revenue' },
    ]},
    { heading: 'FINANCE', items: [
      { label: 'Property Budget', path: '/financials.html' },
      { label: 'Mortgage', hash: 'mortgage' },
    ]},
  ],
  liveStatFetcher: async () => {
    const r = await fetch('/api/briefing-data'); const j = await r.json();
    return (j.data?.house_jobs_remaining ?? '—') + ' jobs remaining';
  },
};
</script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-shell.js"></script>
</body></html>
