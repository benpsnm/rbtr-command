<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOUSE · RBTR</title>
<link rel="stylesheet" href="/css/portal.css">
<style>
.tab-bar{display:flex;gap:4px;margin-bottom:var(--space-4);flex-wrap:wrap}
.tab-btn{padding:var(--space-1) var(--space-3);background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:var(--text-sm);cursor:pointer;border-radius:var(--radius-sm);font-family:var(--font-mono)}
.tab-btn.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary)}
.slim-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.slim-table th{text-align:left;padding:var(--space-2);border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.05em;font-weight:400}
.slim-table td{padding:var(--space-2);border-bottom:1px solid var(--border-subtle)}
.slim-table tr:last-child td{border:none}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3)}
.form-row{display:flex;gap:var(--space-2);margin-bottom:var(--space-2);flex-wrap:wrap;align-items:flex-end}
.form-row input,.form-row select,.form-row textarea{flex:1;min-width:120px;padding:var(--space-2);background:var(--bg-secondary);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:var(--text-sm);border-radius:var(--radius-sm);font-family:var(--font-mono)}
.form-row textarea{min-height:80px}
.section-note{font-size:var(--text-xs);color:var(--text-secondary);margin-bottom:var(--space-3);padding:var(--space-2) var(--space-3);background:var(--bg-secondary);border-left:2px solid var(--border-subtle)}
.pill{display:inline-block;padding:2px 8px;border-radius:var(--radius-pill);font-size:var(--text-xs);font-family:var(--font-mono)}
.pill-ok{background:rgba(74,124,89,.15);color:#6ee7b7}
.pill-warm{background:rgba(217,119,6,.15);color:#fbbf24}
.pill-cold{background:rgba(99,102,241,.15);color:#a5b4fc}
.pill-hot{background:rgba(220,38,38,.15);color:#f87171}
.filter-bar{display:flex;gap:var(--space-2);margin-bottom:var(--space-3);flex-wrap:wrap}
.filter-btn{padding:4px 10px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius-pill);font-size:var(--text-xs);font-family:var(--font-mono)}
.filter-btn.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary)}
.job-card{padding:var(--space-3);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);margin-bottom:var(--space-2)}
.job-card.done{opacity:.5}
.checklist-item{display:flex;gap:var(--space-2);align-items:flex-start;padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle)}
.checklist-item:last-child{border:none}
.checklist-item input[type=checkbox]{margin-top:2px;accent-color:var(--text-primary);width:16px;height:16px;flex-shrink:0}
.checklist-item label{font-size:var(--text-sm);cursor:pointer;line-height:1.4}
.checklist-item label.done{text-decoration:line-through;color:var(--text-secondary)}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="portal-root"></div>

<script src="/js/components.js"></script>
<script src="/js/state.js"></script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-framework.js"></script>
<script src="/js/crm-sops.js"></script>

<script>
const C = window.RBTR_Components;
const { el, card, statCard, button, emptyState } = C;

function proxy(table, op, extra = {}) {
  return fetch('/api/supabase-proxy', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ table, op, ...extra })
  }).then(r => r.ok ? r.json() : []);
}

function logTable(rows, cols) {
  if (!rows || !rows.length) return emptyState({ icon: '📋', title: 'Nothing logged yet', body: 'Add an entry below.' });
  const t = el('table', { className: 'slim-table' });
  const head = el('tr');
  cols.forEach(c => head.appendChild(el('th', {}, c.label)));
  t.appendChild(el('thead', {}, head));
  const tbody = el('tbody');
  rows.forEach(row => {
    const tr = el('tr');
    cols.forEach(c => {
      const val = c.render ? c.render(row) : (row[c.key] ?? '—');
      const td = el('td');
      if (val instanceof HTMLElement) td.appendChild(val);
      else td.textContent = String(val);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  t.appendChild(tbody);
  return t;
}

function tabs(defs, host) {
  const bar = el('div', { className: 'tab-bar' });
  const bodies = [];
  defs.forEach((d, i) => {
    const btn = el('button', { className: 'tab-btn' + (i === 0 ? ' active' : ''), type: 'button' }, d.label);
    const body = el('div', { style: { display: i === 0 ? '' : 'none' } });
    bodies.push(body);
    let loaded = i === 0;
    bar.appendChild(btn);
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bodies.forEach((b, j) => { b.style.display = j === i ? '' : 'none'; });
      if (!loaded) { loaded = true; d.render(body); }
    });
    if (i === 0) d.render(body);
  });
  host.appendChild(bar);
  bodies.forEach(b => host.appendChild(b));
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
async function renderHouseDashboard() {
  const wrap = el('div', {});

  let jobs = [], costs = [], bookings = [];
  try {
    [jobs, costs, bookings] = await Promise.all([
      proxy('house_jobs', 'select'),
      proxy('house_costs', 'select'),
      proxy('house_bookings', 'select', { order: { column: 'arrive_date' } }),
    ]);
  } catch(e) {}

  const totalJobs = Array.isArray(jobs) ? jobs.length : 104;
  const doneJobs = Array.isArray(jobs) ? jobs.filter(j => j.status === 'complete' || j.status === 'done').length : 0;
  const remainingJobs = totalJobs - doneJobs;
  const totalSpend = Array.isArray(costs) ? costs.reduce((a, c) => a + (Number(c.amount) || 0), 0) : 0;
  const budgetMin = 18580, budgetMax = 29830;
  const pctBudget = Math.min(100, Math.round((totalSpend / budgetMax) * 100));

  const nextBooking = Array.isArray(bookings) ? bookings.find(b => new Date(b.arrive_date) >= new Date()) : null;

  const stats = el('div', { className: 'grid-3', style: { marginBottom:'var(--space-4)' } });
  stats.appendChild(statCard({ emoji: '✅', label: 'Jobs remaining', value: remainingJobs, sub: totalJobs + ' total' }));
  stats.appendChild(statCard({ emoji: '💷', label: 'Spend to date', value: '£' + Math.round(totalSpend / 1000) + 'k', sub: 'of £19-30k budget' }));
  stats.appendChild(statCard({ emoji: '📅', label: 'Next guest', value: nextBooking ? new Date(nextBooking.arrive_date).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : 'None', sub: nextBooking ? nextBooking.guest_name : 'pre-launch' }));
  wrap.appendChild(stats);

  wrap.appendChild(card({ children: el('div', {},
    el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-2)' } }, 'PROPERTY'),
    el('p', { style: { color:'var(--text-secondary)', fontSize:'var(--text-sm)', lineHeight:'var(--leading-loose)', margin:'0' } },
      '4 Woodhead Mews, Blacker Hill, Barnsley S74 0RH. ' +
      "Mortgage: £600/mo. Owner: Sarah. Reno budget: £18,580–£29,830. " +
      "Target: AirBnB launch when 104-job reno complete. " +
      "Projected revenue: £2,310/mo at 70% occupancy.")
  )}));
  return wrap;
}

// ── JOBS TRACKER ─────────────────────────────────────────────────────────────
async function renderJobs() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, '104 jobs across 7 categories. Filter by category, who, or status. Tick when done.'));

  let jobs = [];
  try { jobs = await proxy('house_jobs', 'select'); } catch(e) {}
  if (!Array.isArray(jobs)) jobs = [];

  const categories = ['All', 'Blue', 'Pink', 'Attic', 'Garage', 'Compliance', 'Launch'];
  const whoList = ['All', 'Ben', 'Sarah', 'Contractor', 'Amy'];
  const statusList = ['All', 'todo', 'in_progress', 'complete'];

  let activeCategory = 'All', activeWho = 'All', activeStatus = 'All';

  const catBar = el('div', { className: 'filter-bar' });
  const whoBar = el('div', { className: 'filter-bar' });
  const statusBar = el('div', { className: 'filter-bar' });

  categories.forEach(cat => {
    const btn = el('button', { className: 'filter-btn' + (cat === 'All' ? ' active' : ''), type:'button' }, cat);
    btn.addEventListener('click', () => {
      catBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = cat;
      renderJobs();
    });
    catBar.appendChild(btn);
  });
  whoList.forEach(who => {
    const btn = el('button', { className: 'filter-btn' + (who === 'All' ? ' active' : ''), type:'button' }, who);
    btn.addEventListener('click', () => {
      whoBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeWho = who;
      renderJobs();
    });
    whoBar.appendChild(btn);
  });
  statusList.forEach(s => {
    const btn = el('button', { className: 'filter-btn' + (s === 'All' ? ' active' : ''), type:'button' }, s === 'All' ? 'All' : s.replace('_',' ') );
    btn.addEventListener('click', () => {
      statusBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = s;
      renderJobs();
    });
    statusBar.appendChild(btn);
  });

  wrap.appendChild(catBar);
  wrap.appendChild(whoBar);
  wrap.appendChild(statusBar);

  const jobsHost = el('div', {});
  wrap.appendChild(jobsHost);

  const statusCls = { todo: 'pill-cold', in_progress: 'pill-warm', complete: 'pill-ok' };

  function renderJobs() {
    jobsHost.innerHTML = '';
    let filtered = jobs;
    if (activeCategory !== 'All') filtered = filtered.filter(j => j.category === activeCategory);
    if (activeWho !== 'All') filtered = filtered.filter(j => j.who === activeWho);
    if (activeStatus !== 'All') filtered = filtered.filter(j => j.status === activeStatus);

    if (!filtered.length) {
      jobsHost.appendChild(emptyState({ icon: '✅', title: 'No jobs match', body: 'Adjust filters or add jobs below.' }));
      return;
    }

    filtered.forEach(j => {
      const done = j.status === 'complete';
      const c = el('div', { className: 'job-card' + (done ? ' done' : '') });
      c.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' } },
        el('div', {},
          el('span', { className: 'pill pill-cold', style: { marginRight:'var(--space-2)', fontSize:'10px' } }, (j.category || '—').toUpperCase()),
          el('strong', { style: { fontSize:'var(--text-sm)' } }, j.title || j.description || 'Untitled job')
        ),
        el('span', { className: 'pill ' + (statusCls[j.status] || 'pill-cold'), style: { cursor:'pointer' } }, (j.status || 'todo').replace('_',' ').toUpperCase())
      ));
      if (j.who) c.appendChild(el('div', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-1)' } }, 'Who: ' + j.who));
      if (j.estimated_cost) c.appendChild(el('div', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)' } }, 'Est: £' + j.estimated_cost));
      jobsHost.appendChild(c);
    });
  }

  // If no jobs from DB, show placeholder
  if (!jobs.length) {
    jobsHost.appendChild(el('p', { className: 'section-note' }, '104 jobs to be seeded. Run the migration (32_house_jobs_seed.sql) via Supabase dashboard.'));
  } else {
    renderJobs();
  }

  return wrap;
}

// ── SUPPLIERS ────────────────────────────────────────────────────────────────
async function renderSuppliers() {
  const wrap = el('div', {});

  let suppliers = [];
  try { suppliers = await proxy('house_suppliers', 'select', { order: { column: 'name' } }); } catch(e) {}
  if (!Array.isArray(suppliers)) suppliers = [];

  const supplierHost = el('div', {});
  wrap.appendChild(supplierHost);
  function renderSupp() {
    supplierHost.innerHTML = '';
    if (!suppliers.length) {
      supplierHost.appendChild(emptyState({ icon: '👷', title: 'No suppliers yet', body: 'Add trades below.' }));
      return;
    }
    const grid = el('div', { className: 'grid-2' });
    suppliers.forEach(s => {
      const c = card({ children: el('div', {}) });
      const body = c.querySelector('div');
      body.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', marginBottom:'var(--space-1)' } },
        el('strong', {}, s.name),
        el('span', { className: 'pill pill-cold' }, (s.trade || '—').toUpperCase())
      ));
      if (s.phone) body.appendChild(el('a', { href: 'tel:' + s.phone, style: { fontSize:'var(--text-sm)', display:'block', color:'var(--text-secondary)', marginBottom:'2px' } }, s.phone));
      if (s.email) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', margin:'0' } }, s.email));
      if (s.day_rate) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-1)' } }, '£' + s.day_rate + '/day'));
      if (s.rating) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', marginTop:'2px' } }, '★'.repeat(s.rating) + '☆'.repeat(5 - s.rating)));
      if (s.notes) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-1)' } }, s.notes));
      grid.appendChild(c);
    });
    supplierHost.appendChild(grid);
  }
  renderSupp();

  const addCard = card({ children: el('div', {}) });
  const ab = addCard.querySelector('div');
  ab.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-3)' } }, 'ADD SUPPLIER'));
  const nameIn = el('input', { type:'text', placeholder:'Name' });
  const tradeIn = el('select');
  ['builder','electrician','plumber','decorator','tiler','roofer','other'].forEach(t => tradeIn.appendChild(el('option', { value:t }, t)));
  const phoneIn = el('input', { type:'tel', placeholder:'Phone' });
  const emailIn = el('input', { type:'email', placeholder:'Email' });
  const rateIn = el('input', { type:'number', placeholder:'Day rate £' });
  const notesIn = el('input', { type:'text', placeholder:'Notes' });
  const r1 = el('div', { className:'form-row' }); r1.appendChild(nameIn); r1.appendChild(tradeIn);
  const r2 = el('div', { className:'form-row' }); r2.appendChild(phoneIn); r2.appendChild(emailIn);
  const r3 = el('div', { className:'form-row' }); r3.appendChild(rateIn); r3.appendChild(notesIn);
  ab.appendChild(r1); ab.appendChild(r2); ab.appendChild(r3);
  ab.appendChild(button({ label: 'Add supplier', onClick: async () => {
    if (!nameIn.value) return;
    const record = { name: nameIn.value, trade: tradeIn.value, phone: phoneIn.value, email: emailIn.value, day_rate: rateIn.value ? parseFloat(rateIn.value) : null, notes: notesIn.value };
    try {
      await proxy('house_suppliers', 'insert', { record });
      suppliers.unshift({ ...record, id: 'tmp-' + Date.now() });
      renderSupp();
      [nameIn, phoneIn, emailIn, rateIn, notesIn].forEach(i => { i.value = ''; });
      C.toast({ message: 'Supplier added', type: 'success' });
    } catch(e) { C.toast({ message: 'Save failed', type: 'error' }); }
  }}));
  wrap.appendChild(addCard);
  return wrap;
}

// ── COSTS ────────────────────────────────────────────────────────────────────
async function renderCosts() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, 'All renovation spend tracked by category. Budget: £18,580–£29,830 total.'));

  let costs = [];
  try { costs = await proxy('house_costs', 'select', { order: { column: 'date', ascending: false } }); } catch(e) {}
  if (!Array.isArray(costs)) costs = [];

  const totalSpend = costs.reduce((a, c) => a + (Number(c.amount) || 0), 0);
  const byCategory = {};
  costs.forEach(c => {
    const cat = c.category || 'Other';
    byCategory[cat] = (byCategory[cat] || 0) + (Number(c.amount) || 0);
  });

  const stats = el('div', { className: 'grid-2', style: { marginBottom:'var(--space-4)' } });
  stats.appendChild(statCard({ emoji: '💷', label: 'Total spend', value: '£' + totalSpend.toLocaleString(), sub: 'across all categories' }));
  stats.appendChild(statCard({ emoji: '📊', label: 'vs max budget', value: Math.round((totalSpend / 29830) * 100) + '%', sub: 'of £29,830' }));
  wrap.appendChild(stats);

  if (Object.keys(byCategory).length) {
    const catCard = card({ children: el('div', {}) });
    const cb = catCard.querySelector('div');
    cb.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-3)' } }, 'BY CATEGORY'));
    Object.entries(byCategory).sort((a,b) => b[1]-a[1]).forEach(([cat, amt]) => {
      const row = el('div', { style: { display:'flex', justifyContent:'space-between', padding:'var(--space-2) 0', borderBottom:'1px solid var(--border-subtle)', fontSize:'var(--text-sm)' } });
      row.appendChild(el('span', {}, cat));
      row.appendChild(el('span', { style: { fontFamily:'var(--font-mono)' } }, '£' + amt.toLocaleString()));
      cb.appendChild(row);
    });
    wrap.appendChild(catCard);
  }

  wrap.appendChild(logTable(costs.slice(0, 20), [
    { label: 'Date', render: r => r.date ? new Date(r.date).toLocaleDateString('en-GB') : '—' },
    { label: 'Category', key: 'category' },
    { label: 'Amount', render: r => '£' + Number(r.amount).toLocaleString() },
    { label: 'Description', key: 'description' },
  ]));

  const addCard = card({ children: el('div', {}) });
  const ab = addCard.querySelector('div');
  ab.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-3)' } }, 'LOG COST'));
  const dateIn = el('input', { type:'date', value: new Date().toISOString().split('T')[0] });
  const catIn = el('select');
  ['Blue','Pink','Attic','Garage','Compliance','Launch','Other'].forEach(c => catIn.appendChild(el('option', { value:c }, c)));
  const amtIn = el('input', { type:'number', step:'0.01', placeholder:'Amount £' });
  const descIn = el('input', { type:'text', placeholder:'Description' });
  const r1 = el('div', { className:'form-row' }); r1.appendChild(dateIn); r1.appendChild(catIn); r1.appendChild(amtIn);
  const r2 = el('div', { className:'form-row' }); r2.appendChild(descIn);
  ab.appendChild(r1); ab.appendChild(r2);
  ab.appendChild(button({ label: 'Save cost', onClick: async () => {
    if (!amtIn.value) return;
    const record = { date: dateIn.value, category: catIn.value, amount: parseFloat(amtIn.value), description: descIn.value };
    try {
      await proxy('house_costs', 'insert', { record });
      costs.unshift({ ...record, id: 'tmp-' + Date.now() });
      amtIn.value = ''; descIn.value = '';
      C.toast({ message: 'Cost saved', type: 'success' });
    } catch(e) { C.toast({ message: 'Save failed', type: 'error' }); }
  }}));
  wrap.appendChild(addCard);
  return wrap;
}

// ── AIRBNB LISTING ───────────────────────────────────────────────────────────

  const listing = {

  body.appendChild(el('p', { style: { fontWeight:'600', marginBottom:'var(--space-3)' } }, listing.title));

  body.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-2)' } }, 'SHORT DESCRIPTION'));
  body.appendChild(el('p', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)', marginBottom:'var(--space-3)' } }, listing.short));

  body.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-2)' } }, 'FULL DESCRIPTION'));

  body.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-2)' } }, 'AMENITIES'));
  const grid = el('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'var(--space-1)' } });
  listing.amenities.forEach(a => grid.appendChild(el('div', { style: { fontSize:'var(--text-sm)', color:'var(--text-secondary)' } }, '✓ ' + a)));
  body.appendChild(grid);
  wrap.appendChild(c);
  return wrap;

// ── AIRBNB CERTS (compliance) ────────────────────────────────────────────────
async function renderCompliance() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, 'Compliance documents — all required before STR launch. Upload documents and track expiry dates.'));

  let certs = [];
  try { certs = await proxy('house_compliance', 'select'); } catch(e) {}
  if (!Array.isArray(certs)) certs = [];

  const certNames = {
    gas_safety: 'Gas Safety Certificate (CP12)',
    eicr: 'Electrical Installation Condition Report (EICR)',
    fire_risk: 'Fire Risk Assessment',
    pat: 'PAT Testing',
    co_detectors: 'Carbon Monoxide Detectors fitted + tested',
    fire_alarms: 'Smoke / Fire Alarms fitted + tested',
    legionella: 'Legionella Risk Assessment',
  };

  const certHost = el('div', {});
  wrap.appendChild(certHost);

  async function renderCerts() {
    certHost.innerHTML = '';
    const certMap = {};
    certs.forEach(c => { certMap[c.cert_type] = c; });

    Object.entries(certNames).forEach(([type, name]) => {
      const cert = certMap[type] || {};
      const exp = cert.expiry_date ? new Date(cert.expiry_date) : null;
      const now = new Date();
      const expiring = exp && (exp - now) < (90 * 86400000); // 90 days
      const expired = exp && exp < now;

      const c = card({ children: el('div', {}) });
      const body = c.querySelector('div');
      body.appendChild(el('div', { style: { display:'flex', justifyContent:'space-between', marginBottom:'var(--space-2)' } },
        el('strong', { style: { fontSize:'var(--text-sm)' } }, name),
        el('span', { className: 'pill ' + (cert.expiry_date && !expired ? (expiring ? 'pill-warm' : 'pill-ok') : 'pill-cold') },
          cert.expiry_date ? (expired ? 'EXPIRED' : expiring ? 'EXPIRING' : 'VALID') : 'MISSING')
      ));
      if (cert.issue_date) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', margin:'0' } },
        'Issued: ' + new Date(cert.issue_date).toLocaleDateString('en-GB') +
        (cert.expiry_date ? ' · Expires: ' + new Date(cert.expiry_date).toLocaleDateString('en-GB') : '')
      ));
      if (cert.notes) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', marginTop:'var(--space-1)' } }, cert.notes));

      const updateBtn = button({ label: 'Update', size: 'sm', onClick: async () => {
        const issueDate = prompt('Issue date (YYYY-MM-DD):');
        const expiryDate = prompt('Expiry date (YYYY-MM-DD):');
        if (!issueDate) return;
        try {
          await proxy('house_compliance', 'upsert', {
            record: { cert_type: type, issue_date: issueDate, expiry_date: expiryDate || null, updated_at: new Date().toISOString() },
            on_conflict: 'cert_type'
          });
          certMap[type] = { ...cert, cert_type: type, issue_date: issueDate, expiry_date: expiryDate };
          certs = Object.values(certMap);
          await renderCerts();
          C.toast({ message: 'Cert updated', type: 'success' });
        } catch(e) { C.toast({ message: 'Update failed', type: 'error' }); }
      }});
      body.appendChild(el('div', { style: { marginTop:'var(--space-2)' } }, updateBtn));
      certHost.appendChild(c);
    });
  }
  await renderCerts();
  return wrap;
}

async function renderBookings() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, 'Guest bookings log. Manual entry for now — iCal sync from AirBnB in Phase 1.7.'));

  let bookings = [];
  try { bookings = await proxy('house_bookings', 'select', { order: { column: 'arrive_date', ascending: false } }); } catch(e) {}
  if (!Array.isArray(bookings)) bookings = [];

  const revenue = bookings.reduce((a, b) => a + (Number(b.total_paid) || 0), 0);
  const stats = el('div', { className: 'grid-2', style: { marginBottom:'var(--space-4)' } });
  stats.appendChild(statCard({ emoji: '📅', label: 'Total bookings', value: bookings.length, sub: 'all time' }));
  stats.appendChild(statCard({ emoji: '💷', label: 'Revenue', value: '£' + revenue.toLocaleString(), sub: 'total logged' }));
  wrap.appendChild(stats);

  const bookHost = el('div', {});
  wrap.appendChild(bookHost);
  function renderBookList() {
    bookHost.innerHTML = '';
    bookHost.appendChild(logTable(bookings, [
      { label: 'Guest', key: 'guest_name' },
      { label: 'Arrive', render: r => r.arrive_date ? new Date(r.arrive_date).toLocaleDateString('en-GB') : '—' },
      { label: 'Depart', render: r => r.depart_date ? new Date(r.depart_date).toLocaleDateString('en-GB') : '—' },
      { label: 'Nights', key: 'nights' },
      { label: 'Paid', render: r => r.total_paid ? '£' + Number(r.total_paid).toLocaleString() : '—' },
      { label: 'Platform', render: r => el('span', { className: 'pill pill-cold' }, (r.platform || 'airbnb').replace('_',' ').toUpperCase()) },
    ]));
  }
  renderBookList();

  const addCard = card({ children: el('div', {}) });
  const ab = addCard.querySelector('div');
  ab.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-3)' } }, 'ADD BOOKING'));
  const guestIn = el('input', { type:'text', placeholder:'Guest name' });
  const arriveIn = el('input', { type:'date' });
  const departIn = el('input', { type:'date' });
  const paidIn = el('input', { type:'number', placeholder:'Total paid £' });
  const platformIn = el('select');
  ['airbnb','booking_com','direct'].forEach(p => platformIn.appendChild(el('option', { value:p }, p.replace('_',' '))));
  const notesIn = el('input', { type:'text', placeholder:'Notes (optional)' });
  const r1 = el('div', { className:'form-row' }); r1.appendChild(guestIn); r1.appendChild(paidIn); r1.appendChild(platformIn);
  const r2 = el('div', { className:'form-row' }); r2.appendChild(arriveIn); r2.appendChild(departIn); r2.appendChild(notesIn);
  ab.appendChild(r1); ab.appendChild(r2);
  ab.appendChild(button({ label: 'Add booking', onClick: async () => {
    if (!guestIn.value || !arriveIn.value || !departIn.value) return;
    const record = { guest_name: guestIn.value, arrive_date: arriveIn.value, depart_date: departIn.value, total_paid: paidIn.value ? parseFloat(paidIn.value) : null, platform: platformIn.value, notes: notesIn.value };
    try {
      await proxy('house_bookings', 'insert', { record });
      bookings.unshift({ ...record, id: 'tmp-' + Date.now() });
      renderBookList();
      [guestIn, paidIn, notesIn].forEach(i => { i.value = ''; });
      C.toast({ message: 'Booking saved', type: 'success' });
    } catch(e) { C.toast({ message: 'Save failed', type: 'error' }); }
  }}));
  wrap.appendChild(addCard);
  return wrap;
}

// ── GUEST MESSAGES ───────────────────────────────────────────────────────────
async function renderMessages() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, 'Guest messaging templates. Copy-paste ready. Variables in {{double_brackets}} need replacing.'));

  let templates = [];
  try { templates = await proxy('house_message_templates', 'select'); } catch(e) {}
  if (!Array.isArray(templates)) templates = [];

  if (!templates.length) {
    wrap.appendChild(emptyState({ icon: '✉️', title: 'No templates', body: 'Run the migration to seed templates, or add below.' }));
    return wrap;
  }

  templates.forEach(t => {
    const c = card({ children: el('div', {}) });
    const body = c.querySelector('div');
    body.appendChild(el('strong', {}, (t.stage || '').replace(/_/g, ' ').toUpperCase()));
    if (t.subject) body.appendChild(el('p', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', fontFamily:'var(--font-mono)', margin:'var(--space-1) 0' } }, 'Subject: ' + t.subject));
    const pre = el('pre', { style: { fontSize:'var(--text-xs)', color:'var(--text-secondary)', whiteSpace:'pre-wrap', wordBreak:'break-word', background:'var(--bg-secondary)', padding:'var(--space-3)', borderRadius:'var(--radius-sm)', margin:'var(--space-2) 0 0', maxHeight:'200px', overflowY:'auto' } });
    pre.textContent = t.body;
    body.appendChild(pre);
    body.appendChild(el('div', { style: { marginTop:'var(--space-2)' } },
      button({ label: 'Copy', size: 'sm', onClick: () => { navigator.clipboard.writeText(t.body); C.toast({ message: 'Copied to clipboard', type: 'success' }); } })
    ));
    wrap.appendChild(c);
  });
  return wrap;
}

// ── INVENTORY ────────────────────────────────────────────────────────────────
async function renderInventory() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, 'Consumables stock. Log levels after each turnaround. Reorder when below reorder level.'));

  let items = [];
  try { items = await proxy('house_inventory', 'select', { order: { column: 'item' } }); } catch(e) {}
  if (!Array.isArray(items)) items = [];

  const invHost = el('div', {});
  wrap.appendChild(invHost);
  function renderInv() {
    invHost.innerHTML = '';
    if (!items.length) {
      invHost.appendChild(emptyState({ icon: '📦', title: 'No inventory', body: 'Run migration to seed items.' }));
      return;
    }
    const t = el('table', { className: 'slim-table' });
    t.appendChild(el('thead', {}, el('tr', {},
      ...['Item','Stock','Reorder at','Status','Action'].map(h => el('th', {}, h))
    )));
    const tbody = el('tbody');
    items.forEach(item => {
      const low = item.stock_level <= item.reorder_level;
      const tr = el('tr');
      tr.appendChild(el('td', {}, item.item));
      tr.appendChild(el('td', { style: { fontFamily:'var(--font-mono)' } }, String(item.stock_level || 0)));
      tr.appendChild(el('td', { style: { fontFamily:'var(--font-mono)' } }, String(item.reorder_level || 0)));
      tr.appendChild(el('td', {}, el('span', { className: 'pill ' + (low ? 'pill-hot' : 'pill-ok') }, low ? 'REORDER' : 'OK')));
      const actionTd = el('td');
      const adjBtn = button({ label: 'Update', size: 'sm', onClick: async () => {
        const newLevel = prompt('New stock level for ' + item.item + ':', item.stock_level);
        if (newLevel === null) return;
        try {
          await proxy('house_inventory', 'update', {
            filters: [{ column: 'id', op: 'eq', value: item.id }],
            updates: { stock_level: parseInt(newLevel), last_restocked: new Date().toISOString().split('T')[0] }
          });
          item.stock_level = parseInt(newLevel);
          renderInv();
          C.toast({ message: 'Stock updated', type: 'success' });
        } catch(e) { C.toast({ message: 'Update failed', type: 'error' }); }
      }});
      actionTd.appendChild(adjBtn);
      tr.appendChild(actionTd);
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);
    invHost.appendChild(t);
  }
  renderInv();

  const addCard = card({ children: el('div', {}) });
  const ab = addCard.querySelector('div');
  ab.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-3)' } }, 'ADD ITEM'));
  const itemIn = el('input', { type:'text', placeholder:'Item name' });
  const stockIn = el('input', { type:'number', placeholder:'Stock level', min:'0' });
  const reorderIn = el('input', { type:'number', placeholder:'Reorder at', min:'0' });
  const r1 = el('div', { className:'form-row' }); r1.appendChild(itemIn); r1.appendChild(stockIn); r1.appendChild(reorderIn);
  ab.appendChild(r1);
  ab.appendChild(button({ label: 'Add item', onClick: async () => {
    if (!itemIn.value) return;
    const record = { item: itemIn.value, stock_level: parseInt(stockIn.value) || 0, reorder_level: parseInt(reorderIn.value) || 2 };
    try {
      await proxy('house_inventory', 'insert', { record });
      items.push({ ...record, id: 'tmp-' + Date.now() });
      renderInv();
      itemIn.value = ''; stockIn.value = ''; reorderIn.value = '';
      C.toast({ message: 'Item added', type: 'success' });
    } catch(e) { C.toast({ message: 'Save failed', type: 'error' }); }
  }}));
  wrap.appendChild(addCard);
  return wrap;
}

// ── PHOTOS ───────────────────────────────────────────────────────────────────
async function renderPhotos() {
  const wrap = el('div', {});
  wrap.appendChild(el('p', { className: 'section-note' }, '50 target shots for STR marketing. Tick as photographed.'));

  const shots = [
    // Exterior
    { area: 'Exterior', shots: ['Front of house (daytime)','Front of house (evening with lights on)','Driveway and parking','Garden overview','Hot tub (daytime)','Hot tub (evening — lit)','Street view for orientation'] },
    // Ground floor
    { area: 'Ground Floor', shots: ['Lounge full width','Lounge from window angle','Kitchen (wide)','Kitchen (detail — coffee machine, appliances)','Dining area','Hall / entrance area'] },
    // Bedrooms
    { area: 'Master Bedroom', shots: ['Bed wide shot','Ensuite shower','Ensuite detail','Master from door'] },
    { area: 'Bedroom 2', shots: ['Bed + window','Room detail'] },
    { area: 'Bedroom 3', shots: ['Bed + window','Room detail'] },
    // Bathrooms
    { area: 'Bathrooms', shots: ['Family bathroom 1','Family bathroom 2','Bath or shower detail'] },
    // Details
    { area: 'Details', shots: ['Welcome folder + pack','TV + Netflix','Coffee machine close','Fresh towels folded','Toiletries in bathroom','Lockbox for access guide'] },
    // Lifestyle
    { area: 'Lifestyle', shots: ['Hot tub with drinks','Evening garden string lights','Table set for guests','Winter interior (candles etc)'] },
  ];

  const savedKey = 'house_photo_shots';
  const saved = JSON.parse(localStorage.getItem(savedKey) || '{}');

  shots.forEach(section => {
    const c = card({ children: el('div', {}) });
    const body = c.querySelector('div');
    body.appendChild(el('div', { className: 'ds-caption', style: { marginBottom:'var(--space-2)' } }, section.area.toUpperCase()));
    section.shots.forEach((shot, i) => {
      const key = section.area + '_' + i;
      const done = saved[key] === true;
      const row = el('div', { className: 'checklist-item' });
      const cb = el('input', { type:'checkbox' });
      cb.checked = done;
      const lbl = el('label', { className: done ? 'done' : '' }, shot);
      cb.addEventListener('change', () => {
        saved[key] = cb.checked;
        lbl.className = cb.checked ? 'done' : '';
        localStorage.setItem(savedKey, JSON.stringify(saved));
      });
      row.appendChild(cb); row.appendChild(lbl);
      body.appendChild(row);
    });
    wrap.appendChild(c);
  });
  return wrap;
}
