<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOUSE · RBTR</title>
<link rel="stylesheet" href="/css/portal.css">
</head>
<body>
<div id="portal-root"></div>

<script src="/js/components.js"></script>
<script src="/js/state.js"></script>
<script src="/js/auth-guard.js"></script>
<script src="/js/portal-framework.js"></script>

<script>
const C = window.RBTR_Components;
const { el, card, statCard, button, emptyState } = C;

async function renderHouseDashboard() {
  const wrap = el('div', {});
  const stats = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 'var(--space-3)', marginBottom: 'var(--space-5)' }
  });
  stats.appendChild(statCard({ emoji: '✅', label: 'Jobs remaining', value: '—', sub: '104 total' }));
  stats.appendChild(statCard({ emoji: '🏠', label: 'House cash', value: '—', sub: 'latest logged' }));
  stats.appendChild(statCard({ emoji: '🏷', label: 'AirBnB status', value: 'pre-launch', sub: 'target launch TBD' }));
  wrap.appendChild(stats);

  try {
    const r = await fetch('/api/briefing-data');
    const j = await r.json();
    const vals = stats.querySelectorAll('.ds-stat .value');
    if (vals[0]) vals[0].textContent = j.data?.house_jobs_remaining ?? '—';
    // house cash pulled from its own log
    const h = await fetch('/api/supabase-proxy', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ table:'house_cash_log', op:'select' }) });
    if (h.ok) {
      const rows = await h.json();
      if (Array.isArray(rows) && rows.length) {
        rows.sort((a,b) => new Date(b.logged_at) - new Date(a.logged_at));
        if (vals[1]) vals[1].textContent = '£' + Number(rows[0].balance_gbp).toLocaleString();
      }
    }
  } catch(e) {}

  wrap.appendChild(card({ children: el('div', {},
    el('div', { className: 'ds-caption' }, 'PROPERTY'),
    el('p', { style: { margin: 'var(--space-2) 0 0', color: 'var(--text-secondary)', lineHeight: 'var(--leading-loose)' } },
      '4 Woodhead Mews, Blacker Hill, Barnsley S74 0RH. Mortgage £600/mo. ' +
      "Target launch: AirBnB when renovation done. Shared portal — Ben + Sarah."),
  )}));

  return wrap;
}

const HOUSE_PORTAL = {
  id: 'house',
  name: 'HOUSE',
  emoji: '🏠',
  tagline: '4 Woodhead Mews · AirBnB + renovation',
  access: ['ben', 'sarah'],
  liveStatFetcher: async () => {
    try {
      const r = await fetch('/api/briefing-data'); const j = await r.json();
      return (j.data?.house_jobs_remaining ?? '—') + ' jobs remaining';
    } catch { return '—'; }
  },
  sections: [
    { id: 'dashboard',      group: 'OVERVIEW',  label: 'Dashboard',       emoji: '📊', render: renderHouseDashboard, default: true },
    { id: 'overview',       group: 'PROPERTY',  label: 'Overview',        emoji: '🏠', iframeHash: '#sec-house' },
    { id: 'jobs',           group: 'PROPERTY',  label: 'Jobs List',       emoji: '✅', iframeHash: '#sec-jobs' },
    { id: 'renovation',     group: 'PROPERTY',  label: 'Renovation Plan', emoji: '🔨', iframeHash: '#sec-house' },
    { id: 'airbnb',         group: 'AIRBNB',    label: 'Listing',         emoji: '✍️', iframeHash: '#sec-airbnb' },
    { id: 'airbnb-certs',   group: 'AIRBNB',    label: 'Certs',           emoji: '📋', iframeHash: '#sec-airbnb-certs' },
    { id: 'airbnb-bookings',group: 'AIRBNB',    label: 'Bookings',        emoji: '📅', render: () => emptyState({ icon: '📅', title: 'Bookings coming', body: 'Wires up once AirBnB listing is live.' }) },
    { id: 'airbnb-sops',    group: 'AIRBNB',    label: 'SOPs',            emoji: '🧹', render: () => emptyState({ icon: '🧹', title: 'SOPs coming', body: 'Cleaning + turnover SOPs for Amy + Sarah\'s mum.' }) },
    { id: 'budget',         group: 'FINANCE',   label: 'Property Budget', emoji: '💷', render: () => emptyState({ icon: '💷', title: 'Property budget', body: 'Filters financial_transactions where entity=house. Use Financials portal for now.' }) },
  ],
};

window.RBTR_Portal.mount(HOUSE_PORTAL);
</script>
</body>
</html>
